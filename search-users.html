<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — البحث عن أعضاء</title>
<meta name="theme-color" content="#FF5C1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="رِحلة">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.5);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;padding-top:var(--nav-h);padding-bottom:calc(var(--bot-h)+40px);}

/* NAV */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-profile-btn{padding:8px 14px;border-radius:20px;background:rgba(255,92,26,0.15);border:1px solid rgba(255,92,26,0.3);color:var(--or);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}

/* SEARCH BAR */
.search-wrap{padding:16px;}
.search-box{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:16px;padding:12px 16px;transition:border-color .2s;}
.search-box:focus-within{border-color:var(--or);}
.search-box input{flex:1;background:none;border:none;outline:none;color:white;font-family:'Tajawal',sans-serif;font-size:15px;direction:rtl;}
.search-box input::placeholder{color:var(--muted);}
.search-icon{font-size:18px;color:var(--muted);}

/* FILTERS */
.filters{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;}
.filter-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:none;color:rgba(255,255,255,0.6);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;}
.filter-btn.active{background:var(--or);border-color:var(--or);color:white;}

/* RESULTS */
.results{padding:0 16px;}
.user-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.user-card:hover{border-color:rgba(255,92,26,0.3);background:rgba(255,92,26,0.05);}
.user-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--yl));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:15px;font-weight:800;margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.user-meta{font-size:12px;color:var(--muted);}
.badge-agent{background:rgba(255,208,0,0.15);color:var(--yl);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;}
.badge-verified{color:var(--tl);font-size:14px;}
.user-type{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:800;}
.type-agent{background:rgba(255,208,0,0.1);color:var(--yl);}
.type-traveler{background:rgba(0,201,177,0.1);color:var(--tl);}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-text{font-size:15px;font-weight:700;margin-bottom:6px;color:rgba(255,255,255,0.7);}
.empty-sub{font-size:13px;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

/* BOTNAV */
.botnav{position:fixed;bottom:0;width:100%;background:rgba(14,14,14,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;height:var(--bot-h);z-index:1000;}
.bitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;border:none;background:none;font-family:'Tajawal',sans-serif;}
.bitem.active,.bitem:hover{color:var(--or);}
.bi{font-size:22px;}
</style>
</head>
<body>

<nav class="topnav">
  <button class="nav-profile-btn" id="navProfileBtn" onclick="goToProfile()">ملفي 👤</button>
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <div style="width:70px"></div>
</nav>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث باسم العضو أو المرشد..." oninput="onSearch()">
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">🌍 الكل</button>
  <button class="filter-btn" onclick="setFilter('traveler',this)">✈️ مسافرون</button>
  <button class="filter-btn" onclick="setFilter('agent',this)">🧭 مرشدون</button>
</div>

<!-- RESULTS -->
<div class="results" id="results">
  <div class="empty">
    <div class="empty-icon">🔍</div>
    <div class="empty-text">ابحث عن عضو أو مرشد</div>
    <div class="empty-sub">اكتب الاسم للبدء</div>
  </div>
</div>

<!-- BOTNAV -->
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div>الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">✈️</div><div>الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div>الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div>طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🤝</div><div>المرشدون</div></a>
</nav>

<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');

let activeFilter='all', searchTimer=null;

async function goToProfile(){
  const{data:{session}}=await sb.auth.getSession();
  window.location.href=session?'profile.html':'auth.html';
}

// Init nav
async function initNav(){
  const{data:{session}}=await sb.auth.getSession();
  const btn=document.getElementById('navProfileBtn');
  if(session){
    const{data:p}=await sb.from('profiles').select('full_name').eq('id',session.user.id).maybeSingle();
    btn.textContent=(p?.full_name?.split(' ')[0]||'ملفي')+' 👤';
  }
}
initNav();

function setFilter(f, el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const q=document.getElementById('searchInput').value.trim();
  if(q) doSearch(q);
  else if(f!=='all') doSearch('');
  else showEmpty();
}

function onSearch(){
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  searchTimer = setTimeout(()=>doSearch(q), 300);
}

function showEmpty(){
  document.getElementById('results').innerHTML=`
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">ابحث عن عضو أو مرشد</div>
      <div class="empty-sub">اكتب الاسم للبدء</div>
    </div>`;
}

async function doSearch(q){
  document.getElementById('results').innerHTML='<div class="loading">⏳ جاري البحث...</div>';

  let query = sb.from('profiles').select('*').order('created_at', {ascending: false});

  // Filter by type
  if(activeFilter==='agent') query = query.eq('account_type','agent');
  else if(activeFilter==='traveler') query = query.or('account_type.is.null,account_type.eq.traveler');

  // Filter by name if query exists
  if(q) query = query.ilike('full_name','%'+q+'%');

  const{data, error} = await query.limit(50);

  if(error || !data?.length){
    document.getElementById('results').innerHTML=`
      <div class="empty">
        <div class="empty-icon">😕</div>
        <div class="empty-text">لا توجد نتائج</div>
        <div class="empty-sub">جرب اسماً مختلفاً</div>
      </div>`;
    return;
  }

  // Get verified agents
  const agentIds = data.filter(u=>u.account_type==='agent').map(u=>u.id);
  let verifiedSet = new Set();
  if(agentIds.length){
    const{data:agents} = await sb.from('agents').select('user_id,is_verified').in('user_id',agentIds);
    agents?.filter(a=>a.is_verified).forEach(a=>verifiedSet.add(a.user_id));
  }

  const html = data.map(u=>{
    const isAgent = u.account_type==='agent';
    const isVerified = verifiedSet.has(u.id);
    const name = u.full_name || u.email?.split('@')[0] || 'عضو جديد';
    const initial = name[0].toUpperCase();
    const country = u.country ? `📍 ${u.country}` : '';
    const date = new Date(u.created_at).toLocaleDateString('ar-KW');
    return `
      <div class="user-card" onclick="window.location.href='user.html?id=${u.id}'">
        <div class="user-avatar">${initial}</div>
        <div class="user-info">
          <div class="user-name">
            ${name}
            ${isVerified?'<span class="badge-verified">✅</span>':''}
          </div>
          <div class="user-meta">${country} ${country?'·':''} انضم ${date}</div>
        </div>
        <span class="user-type ${isAgent?'type-agent':'type-traveler'}">
          ${isAgent?'🧭 مرشد':'✈️ مسافر'}
        </span>
      </div>`;
  }).join('');

  document.getElementById('results').innerHTML = html;
}

initNav();
// عرض الكل عند الفتح
doSearch('');
</script>
</body>
</html>
