<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — الإشعارات</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:60px;--bot-h:68px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-bottom:calc(var(--bot-h)+20px);}

.topnav{position:fixed;top:0;width:100%;z-index:1000;padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:24px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;}
.nav-right{display:flex;align-items:center;gap:12px;}
.mark-all{font-size:13px;color:var(--or);font-weight:700;cursor:pointer;background:none;border:none;}

/* NOT LOGGED */
.not-logged{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;}
.not-logged.show{display:flex;}
.not-logged .icon{font-size:64px;margin-bottom:20px;}
.not-logged h2{font-size:22px;font-weight:900;margin-bottom:10px;}
.not-logged p{font-size:14px;color:var(--muted);margin-bottom:24px;}
.auth-btn{padding:14px 32px;border-radius:28px;background:var(--or);color:white;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;border:none;cursor:pointer;}

/* MAIN */
.main{position:relative;z-index:1;padding:calc(var(--nav-h)+24px) 20px 0;}

/* HEADER */
.page-header{margin-bottom:24px;}
.page-header h1{font-size:26px;font-weight:900;margin-bottom:6px;}
.page-header p{font-size:14px;color:var(--muted);}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:16px;padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:10px;border-radius:13px;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .2s;}
.tab.active{background:var(--or);color:white;}

/* NOTIFICATIONS LIST */
.notifs-list{display:flex;flex-direction:column;gap:10px;}

.notif-item{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:all .25s;position:relative;}
.notif-item:hover{border-color:rgba(255,92,26,0.3);transform:translateX(-3px);}
.notif-item.unread{background:rgba(255,92,26,0.06);border-color:rgba(255,92,26,0.2);}
.notif-item.unread::before{content:'';position:absolute;top:16px;left:16px;width:8px;height:8px;border-radius:50%;background:var(--or);}

.notif-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ni-join{background:rgba(255,92,26,0.15);}
.ni-accepted{background:rgba(0,201,177,0.15);}
.ni-rejected{background:rgba(229,57,53,0.1);}
.ni-general{background:rgba(255,208,0,0.12);}

.notif-content{flex:1;}
.notif-title{font-size:15px;font-weight:800;margin-bottom:4px;line-height:1.3;}
.notif-body{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:6px;}
.notif-time{font-size:11px;color:rgba(255,255,255,0.25);}

.notif-arrow{color:rgba(255,255,255,0.2);font-size:16px;align-self:center;flex-shrink:0;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;}
.empty-state .eicon{font-size:56px;margin-bottom:16px;}
.empty-state h3{font-size:20px;font-weight:800;margin-bottom:8px;}
.empty-state p{font-size:14px;color:var(--muted);}

/* UNREAD BADGE */
.unread-count{display:inline-flex;align-items:center;justify-content:center;background:var(--or);color:white;font-size:11px;font-weight:800;width:20px;height:20px;border-radius:50%;margin-right:6px;}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 16px;border-radius:14px;flex:1;border:none;background:transparent;position:relative;}
.bnav-item.active .bni,.bnav-item.active .bnl{color:var(--or);}
.bni{font-size:22px;}
.bnl{font-size:11px;font-weight:700;color:var(--muted);}
.nav-badge{position:absolute;top:4px;right:12px;background:var(--or);color:white;font-size:10px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--bot-h)+16px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:12px 22px;border-radius:22px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border:1px solid rgba(255,255,255,0.08);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- NOT LOGGED -->
<div class="not-logged" id="notLogged">
  <div class="icon">🔔</div>
  <h2>سجّل دخولك أولاً</h2>
  <p>تحتاج حساباً لعرض إشعاراتك</p>
  <button class="auth-btn" onclick="window.location.href='auth.html'">تسجيل / دخول ✈️</button>
</div>

<!-- NAV -->
<nav class="topnav">
  <div class="nav-logo" onclick="window.location.href='index.html'">Rihla</div>
  <div class="nav-right">
    <button class="mark-all" id="markAllBtn" onclick="markAllRead()" style="display:none">تحديد الكل كمقروء</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main" id="mainContent" style="display:none">
  <div class="page-header">
    <h1>🔔 الإشعارات</h1>
    <p id="unreadLabel">لا توجد إشعارات جديدة</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all', this)">الكل</button>
    <button class="tab" onclick="setTab('unread', this)">غير المقروءة</button>
  </div>

  <div class="notifs-list" id="notifsList"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="botnav">
  <button class="bnav-item" onclick="window.location.href='index.html'"><div class="bni">🏠</div><div class="bnl">الرئيسية</div></button>
  <button class="bnav-item" onclick="window.location.href='index.html'"><div class="bni">✈️</div><div class="bnl">الرحلات</div></button>
  <button class="bnav-item active"><div class="bni">🔔</div><div class="bnl">الإشعارات</div></button>
  <button class="bnav-item" onclick="goToProfile()"><div class="bni">👤</div><div class="bnl">حسابي</div></button>
</nav>

<div class="toast" id="toast"></div>

<script>
const{createClient}=supabase;
const sb=createClient(
  'https://ybjdagurvkweabujkeyz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI'
);

let currentUser=null, allNotifs=[], currentTab='all';

const TYPE_ICONS={
  'join_request':'✈️',
  'request_accepted':'🎉',
  'request_rejected':'😔',
  'general':'🔔',
};
const TYPE_CLASSES={
  'join_request':'ni-join',
  'request_accepted':'ni-accepted',
  'request_rejected':'ni-rejected',
  'general':'ni-general',
};

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){document.getElementById('notLogged').classList.add('show');return;}
  currentUser=session.user;
  document.getElementById('mainContent').style.display='block';
  await loadNotifications();
  subscribeToNotifications();
}

async function loadNotifications(){
  const{data,error}=await sb
    .from('notifications')
    .select('*')
    .eq('user_id',currentUser.id)
    .order('created_at',{ascending:false});

  if(error){showToast('❌ تعذّر تحميل الإشعارات');return;}
  allNotifs=data||[];
  renderNotifications();
  updateUnreadLabel();
}

function renderNotifications(){
  const list=document.getElementById('notifsList');
  const filtered=currentTab==='unread'
    ? allNotifs.filter(n=>!n.is_read)
    : allNotifs;

  if(filtered.length===0){
    list.innerHTML=`
      <div class="empty-state">
        <div class="eicon">${currentTab==='unread'?'✅':'🔔'}</div>
        <h3>${currentTab==='unread'?'كل الإشعارات مقروءة!':'لا توجد إشعارات بعد'}</h3>
        <p>${currentTab==='unread'?'أحسنت! ليس لديك إشعارات جديدة':'ستظهر هنا إشعاراتك عند وجود تحديثات'}</p>
      </div>`;
    return;
  }

  list.innerHTML=filtered.map(n=>`
    <div class="notif-item ${n.is_read?'':'unread'}" onclick="openNotif('${n.id}','${n.link||''}')">
      <div class="notif-icon ${TYPE_CLASSES[n.type]||'ni-general'}">${TYPE_ICONS[n.type]||'🔔'}</div>
      <div class="notif-content">
        <div class="notif-title">${n.title}</div>
        <div class="notif-body">${n.body}</div>
        <div class="notif-time">${timeAgo(n.created_at)}</div>
      </div>
      <div class="notif-arrow">←</div>
    </div>`).join('');
}

async function openNotif(id, link){
  // علّم كمقروء
  await sb.from('notifications').update({is_read:true}).eq('id',id);
  const n=allNotifs.find(x=>x.id===id);
  if(n) n.is_read=true;
  updateUnreadLabel();
  renderNotifications();

  // انتقل للرابط
  if(link&&link!=='undefined'&&link!=='null'){
    // تحويل المسار المطلق للنسبي
    const path=link.replace('/rihla/','');
    window.location.href=path;
  }
}

async function markAllRead(){
  await sb.from('notifications')
    .update({is_read:true})
    .eq('user_id',currentUser.id)
    .eq('is_read',false);
  allNotifs.forEach(n=>n.is_read=true);
  updateUnreadLabel();
  renderNotifications();
  showToast('✅ تم تحديد كل الإشعارات كمقروءة');
}

function updateUnreadLabel(){
  const unread=allNotifs.filter(n=>!n.is_read).length;
  const label=document.getElementById('unreadLabel');
  const markBtn=document.getElementById('markAllBtn');
  if(unread>0){
    label.innerHTML=`<span class="unread-count">${toAr(unread)}</span> إشعار غير مقروء`;
    markBtn.style.display='block';
  } else {
    label.textContent='كل الإشعارات مقروءة ✅';
    markBtn.style.display='none';
  }
}

function setTab(tab, el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderNotifications();
}

// ── REALTIME ──
function subscribeToNotifications(){
  sb.channel('notifications')
    .on('postgres_changes',{
      event:'INSERT',
      schema:'public',
      table:'notifications',
      filter:`user_id=eq.${currentUser.id}`
    }, payload => {
      allNotifs.unshift(payload.new);
      renderNotifications();
      updateUnreadLabel();
      showToast(`🔔 ${payload.new.title}`);
    })
    .subscribe();
}

function timeAgo(dateStr){
  const diff=Date.now()-new Date(dateStr).getTime();
  const mins=Math.floor(diff/60000);
  const hours=Math.floor(diff/3600000);
  const days=Math.floor(diff/86400000);
  if(mins<1) return 'الآن';
  if(mins<60) return `منذ ${toAr(mins)} دقيقة`;
  if(hours<24) return `منذ ${toAr(hours)} ساعة`;
  return `منذ ${toAr(days)} يوم`;
}

function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}

async function goToProfile(){
  const{data:{session}}=await sb.auth.getSession();
  window.location.href=session?'profile.html':'auth.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

init();
</script>
</body>
</html>
