<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — ملفي الشخصي</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:56px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-bottom:calc(var(--bot-h)+24px);}

/* NAV */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;padding:0;}
.nav-edit{padding:7px 14px;border-radius:18px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:rgba(255,255,255,0.7);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}

/* LOADING */
.loading{position:fixed;inset:0;z-index:2000;background:var(--dk);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading.hide{display:none;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,92,26,0.15);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* NOT LOGGED */
.not-logged{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center;}
.not-logged.show{display:flex;}
.not-logged .ni{font-size:64px;margin-bottom:20px;}
.not-logged h2{font-size:22px;font-weight:900;margin-bottom:10px;}
.not-logged p{font-size:14px;color:var(--muted);margin-bottom:24px;}
.auth-btn{padding:14px 32px;border-radius:28px;background:var(--or);color:white;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;border:none;cursor:pointer;}

/* COVER */
.cover{height:180px;position:relative;margin-top:var(--nav-h);overflow:hidden;}
.cover-bg{position:absolute;inset:0;}
.cover-pattern{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.07) 1px,transparent 1px);background-size:18px 18px;}

/* AVATAR */
.avatar-section{padding:0 16px;}
.avatar-wrap{margin-top:-44px;display:inline-block;}
.avatar{width:88px;height:88px;border-radius:24px;border:4px solid var(--dk);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;}

/* INFO */
.info{padding:12px 16px 16px;}
.profile-name{font-size:24px;font-weight:900;margin-bottom:5px;}
.profile-type{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:13px;font-size:12px;font-weight:800;margin-bottom:10px;}
.tt{background:rgba(255,92,26,0.15);color:var(--or);}
.ta{background:rgba(0,201,177,0.15);color:var(--tl);}
.profile-bio{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:12px;}
.profile-meta{display:flex;gap:14px;flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}

/* AGENT RATING BANNER */
.rating-banner{margin:0 16px 16px;background:linear-gradient(135deg,rgba(255,208,0,0.1),rgba(255,92,26,0.05));border:1px solid rgba(255,208,0,0.2);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;}
.rb-stars{font-size:24px;}
.rb-info strong{display:block;font-size:20px;font-weight:900;color:var(--yl);}
.rb-info span{font-size:12px;color:var(--muted);}
.rb-badge{margin-right:auto;background:rgba(255,208,0,0.15);border:1px solid rgba(255,208,0,0.25);padding:6px 14px;border-radius:12px;font-size:12px;font-weight:800;color:var(--yl);}

/* STATS */
.stats{display:flex;margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.stat{flex:1;padding:14px 6px;text-align:center;border-left:1px solid var(--border);}
.stat:last-child{border-left:none;}
.stat .sv{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;}
.stat .sl{font-size:10px;color:var(--muted);margin-top:2px;}

/* COUNTRIES */
.countries-wrap{margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;}
.cw-title{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.flags{display:flex;gap:7px;flex-wrap:wrap;}
.flag-tag{padding:5px 11px;border-radius:11px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:12px;font-weight:600;}
.add-flag{padding:5px 11px;border-radius:11px;border:1.5px dashed rgba(255,92,26,0.3);background:transparent;color:var(--or);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}

/* ACTION BTNS */
.action-row{display:flex;gap:8px;margin:0 16px 16px;}
.abtn{flex:1;padding:11px;border-radius:13px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.ab-edit{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8);border:1px solid var(--border);}
.ab-post{background:rgba(255,92,26,0.1);color:var(--or);border:1px solid rgba(255,92,26,0.2);}
.ab-agent{background:rgba(0,201,177,0.1);color:var(--tl);border:1px solid rgba(0,201,177,0.2);}

/* TABS */
.tabs{display:flex;margin:0 16px 16px;background:rgba(255,255,255,0.04);border-radius:14px;padding:3px;}
.tab{flex:1;padding:9px 4px;border-radius:12px;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--or);color:white;}

/* POSTS */
.posts-wrap{padding:0 16px;}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:14px;}
.post-img-single{width:100%;height:200px;object-fit:cover;}
.post-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:180px;}
.post-img-grid img{width:100%;height:100%;object-fit:cover;}
.post-no-img{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,rgba(255,92,26,0.1),rgba(255,208,0,0.06));}
.post-body{padding:14px;}
.post-dest{font-size:11px;color:var(--or);font-weight:700;margin-bottom:4px;}
.post-title{font-size:15px;font-weight:900;margin-bottom:6px;}
.post-text{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.7;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.post-foot{display:flex;align-items:center;justify-content:space-between;}
.post-time{font-size:10px;color:var(--muted);}
.like-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:10px;background:rgba(255,92,26,0.07);border:1px solid rgba(255,92,26,0.12);color:rgba(255,255,255,0.5);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.like-btn.liked{background:rgba(255,92,26,0.18);color:var(--or);}

/* TRIPS */
.trips-wrap{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.trip-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;gap:10px;align-items:center;cursor:pointer;transition:all .2s;}
.trip-card:hover{border-color:var(--or);}
.trip-em{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.trip-info{flex:1;}
.trip-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.trip-meta{font-size:11px;color:var(--muted);}
.trip-seats{padding:4px 9px;border-radius:8px;font-size:10px;font-weight:700;flex-shrink:0;}

/* ACTIVITY (للمسافر) */
.activity-wrap{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.activity-summary{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;}
.act-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:14px;letter-spacing:1px;}
.act-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.act-stat{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;text-align:center;}
.act-stat .av{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-bottom:4px;}
.act-stat .al{font-size:11px;color:var(--muted);}
.act-desc{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.7;padding:12px;background:rgba(0,201,177,0.06);border-radius:12px;border:1px solid rgba(0,201,177,0.12);}

/* AGENT SERVICES TAB */
.services-wrap{padding:0 16px;}
.agent-profile-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;}
.apc-title{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:14px;letter-spacing:1px;}
.svcs-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.svc-pill{padding:8px 16px;border-radius:14px;background:rgba(0,201,177,0.1);color:var(--tl);font-size:13px;font-weight:700;border:1px solid rgba(0,201,177,0.2);}
.contact-links{display:flex;flex-direction:column;gap:8px;}
.clink{display:flex;align-items:center;gap:12px;padding:13px 14px;background:rgba(255,255,255,0.04);border-radius:13px;border:1px solid var(--border);text-decoration:none;color:white;transition:all .2s;}
.clink:hover{border-color:var(--tl);}
.clink .ci{font-size:20px;}
.clink .ct strong{display:block;font-size:13px;font-weight:800;}
.clink .ct span{font-size:11px;color:var(--muted);}
.clink .ca{margin-right:auto;font-size:11px;color:var(--tl);font-weight:700;}
.no-contact{font-size:13px;color:var(--muted);text-align:center;padding:16px;}

/* REVIEWS (لمساعد السفر) */
.reviews-wrap{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.rev-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.rev-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.rev-av{width:32px;height:32px;border-radius:10px;background:rgba(255,92,26,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.rev-info strong{display:block;font-size:12px;font-weight:800;}
.rev-info span{font-size:10px;color:var(--muted);}
.rev-stars{margin-right:auto;color:var(--yl);font-size:13px;}
.rev-text{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.6;}
.no-reviews{text-align:center;padding:32px 20px;background:var(--card);border-radius:14px;border:1px dashed var(--border);}
.no-reviews .ei{font-size:40px;margin-bottom:10px;}
.no-reviews p{font-size:13px;color:var(--muted);}

/* EMPTY */
.empty{text-align:center;padding:40px 16px;}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h3{font-size:16px;font-weight:800;margin-bottom:6px;}
.empty p{font-size:12px;color:var(--muted);}

/* LOGOUT */
.logout-btn{width:calc(100% - 32px);margin:16px 16px 0;padding:13px;border-radius:14px;background:rgba(229,57,53,0.07);border:1.5px solid rgba(229,57,53,0.15);color:#ff6b6b;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:#161616;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .4s cubic-bezier(.34,1.2,.64,1);}
.overlay.open .sheet{transform:translateY(0);}
.sheet::-webkit-scrollbar{display:none;}
.handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:12px auto;}
.sheet-body{padding:0 18px 28px;}
.sheet-title{font-size:19px;font-weight:900;margin-bottom:18px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:800;color:rgba(255,255,255,0.5);margin-bottom:5px;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);font-family:'Tajawal',sans-serif;font-size:14px;color:white;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--or);}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,0.2);}
.field textarea{resize:vertical;min-height:85px;}
.field select option{background:#222;}
.save-btn{width:100%;padding:13px;border-radius:13px;border:none;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:900;cursor:pointer;margin-top:6px;}
.sb-or{background:linear-gradient(135deg,var(--or),#ff8c42);color:white;}
.sb-tl{background:linear-gradient(135deg,var(--tl),#00a896);color:var(--dk);}
.save-btn:disabled{opacity:0.6;cursor:not-allowed;}
.svcs-check{display:flex;gap:7px;flex-wrap:wrap;}
.sc{padding:7px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.55);transition:all .2s;}
.sc.on{background:rgba(0,201,177,0.15);color:var(--tl);border-color:rgba(0,201,177,0.3);}
.img-upload{border:2px dashed rgba(255,255,255,0.12);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin-bottom:10px;}
.img-upload input{display:none;}
.img-preview{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.img-prev{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;}
.img-prev img{width:100%;height:100%;object-fit:cover;}
.img-prev button{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.65);border:none;color:white;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.csearch{width:100%;padding:10px 13px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);font-family:'Tajawal',sans-serif;font-size:13px;color:white;outline:none;margin-bottom:10px;}
.countries-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;}
.country-opt{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:12px;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;border:1px solid transparent;}
.country-opt.sel{background:rgba(255,92,26,0.08);border-color:rgba(255,92,26,0.2);}
.country-opt .cn{font-size:13px;font-weight:600;}
.country-opt .ck{color:var(--or);font-size:14px;display:none;}
.country-opt.sel .ck{display:block;}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom);}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--bot-h)+14px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:11px 20px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border:1px solid rgba(255,255,255,0.08);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><p style="font-size:13px;color:rgba(255,255,255,0.4)">جاري التحميل...</p></div>

<div class="not-logged" id="notLogged">
  <div class="ni">👤</div>
  <h2>سجّل دخولك أولاً</h2>
  <p>تحتاج حساباً لعرض ملفك الشخصي</p>
  <button class="auth-btn" onclick="window.location.href='auth.html'">تسجيل / دخول ✈️</button>
</div>

<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-edit" onclick="openEditModal()">✏️ تعديل</button>
</nav>

<div id="mainContent" style="display:none">

  <!-- COVER -->
  <div class="cover">
    <div class="cover-bg" id="coverBg"></div>
    <div class="cover-pattern"></div>
  </div>

  <!-- AVATAR -->
  <div class="avatar-section">
    <div class="avatar-wrap">
      <div class="avatar" id="avatarEl"></div>
    </div>
  </div>

  <!-- INFO -->
  <div class="info">
    <div class="profile-name" id="profileName"></div>
    <div class="profile-type" id="profileType"></div>
    <div class="profile-bio" id="profileBio" style="display:none"></div>
    <div class="profile-meta">
      <div class="meta-item">📍 <span id="profileCountry">الكويت</span></div>
      <div class="meta-item">📅 <span id="profileJoined"></span></div>
    </div>
  </div>

  <!-- AGENT RATING BANNER (للمساعد فقط) -->
  <div class="rating-banner" id="ratingBanner" style="display:none">
    <div class="rb-stars" id="rbStars">☆☆☆☆☆</div>
    <div class="rb-info">
      <strong id="rbAvg">—</strong>
      <span id="rbCount">لا توجد تقييمات بعد</span>
    </div>
    <div class="rb-badge" id="rbBadge">مساعد سفريات</div>
  </div>

  <!-- STATS -->
  <div class="stats" id="statsRow"></div>

  <!-- COUNTRIES -->
  <div class="countries-wrap">
    <div class="cw-title">🌍 الدول التي زرتها</div>
    <div class="flags" id="flagsWrap">
      <button class="add-flag" onclick="openCountriesModal()">+ أضف دولة</button>
    </div>
  </div>

  <!-- ACTION BTNS -->
  <div class="action-row" id="actionRow"></div>

  <!-- TABS -->
  <div class="tabs" id="tabsRow"></div>

  <!-- CONTENT -->
  <div id="postsWrap" class="posts-wrap"></div>
  <div id="tripsWrap" class="trips-wrap" style="display:none"></div>
  <div id="activityWrap" class="activity-wrap" style="display:none"></div>
  <div id="servicesWrap" class="services-wrap" style="display:none"></div>
  <div id="reviewsWrap" class="reviews-wrap" style="display:none"></div>

  <div style="height:16px"></div>

</div>

<!-- BOTTOM NAV -->
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div class="bl">طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🤝</div><div class="bl">المساعدون</div></a>
</nav>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay" onclick="closeOverlay('editOverlay',event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-body">

function setTab(tab,el){

  el.classList.add('active');
  document.getElementById('postsWrap').style.display=tab==='posts'?'block':'none';
  document.getElementById('tripsWrap').style.display=tab==='trips'?'flex':'none';
  document.getElementById('activityWrap').style.display=tab==='activity'?'flex':'none';
  document.getElementById('servicesWrap').style.display=tab==='services'?'block':'none';
  document.getElementById('reviewsWrap').style.display=tab==='reviews'?'flex':'none';
  if(tab==='services') renderServices();
}

// ══ LIKE ══
async function toggleLike(postId,cur){
  const btn=document.getElementById(`lk-${postId}`);
  const liked=myLikes.has(postId);
  if(liked){
    myLikes.delete(postId);
    await sb.from('post_likes').delete().eq('post_id',postId).eq('user_id',currentUser.id);
    await sb.from('posts').update({likes:Math.max(0,cur-1)}).eq('id',postId);
    btn.className='like-btn';btn.innerHTML=`🤍 ${toAr(Math.max(0,cur-1))}`;
  }else{
    myLikes.add(postId);
    await sb.from('post_likes').insert({post_id:postId,user_id:currentUser.id});
    await sb.from('posts').update({likes:cur+1}).eq('id',postId);
    btn.className='like-btn liked';btn.innerHTML=`❤️ ${toAr(cur+1)}`;
  }
}

  const country=document.getElementById('editCountry').value.replace(/🇰🇼|🇸🇦|🇦🇪|🇶🇦|🇧🇭|🇴🇲|🇯🇴|🇪🇬|🌍/g,'').trim();
  const{error}=await sb.from('profiles').upsert({id:currentUser.id,full_name:name,bio,country,account_type:profile?.account_type||'traveler'});
  btn.disabled=false;btn.textContent='حفظ التغييرات ✓';
  if(error){showToast('❌ '+error.message);return;}
  profile={...profile,full_name:name,bio,country};
  renderProfile();
  document.getElementById('editOverlay').classList.remove('open');
  showToast('✅ تم حفظ التغييرات!');
}

// ══ AGENT MODAL ══
function openAgentModal(){
  if(agentData){
    document.getElementById('agBio').value=agentData.bio||'';
    document.getElementById('agWa').value=agentData.whatsapp||'';
    document.getElementById('agIg').value=agentData.instagram||'';
    selSvcs=[...(agentData.services||[])];
    document.querySelectorAll('.sc').forEach(el=>{
      const svc=el.textContent.trim().replace(/^[^\s]+\s/,'');
      el.classList.toggle('on',selSvcs.some(s=>el.onclick.toString().includes(s)));
    });
  }
  document.getElementById('agentOverlay').classList.add('open');
}
function toggleSvc(el,svc){
  if(selSvcs.includes(svc)){selSvcs=selSvcs.filter(s=>s!==svc);el.classList.remove('on');}
  else{selSvcs.push(svc);el.classList.add('on');}
}
async function saveAgentProfile(){
  const btn=document.getElementById('saveAgBtn');
  btn.disabled=true;btn.textContent='جاري الحفظ...';
  const bio=document.getElementById('agBio').value.trim();
  const wa=document.getElementById('agWa').value.trim();
  const ig=document.getElementById('agIg').value.trim();
  const{data,error}=await sb.from('agents').upsert({user_id:currentUser.id,full_name:profile?.full_name||'',bio,services:selSvcs,whatsapp:wa,instagram:ig});
  btn.disabled=false;btn.textContent='حفظ ملف المساعد ✓';
  if(error){showToast('❌ '+error.message);return;}
  const{data:ag}=await sb.from('agents').select('*').eq('user_id',currentUser.id).single();
  agentData=ag;
  document.getElementById('agentOverlay').classList.remove('open');
  showToast('✅ تم تحديث ملف المساعد!');
  renderServices();
}

// ══ POST ══
function openPostModal(){document.getElementById('postOverlay').classList.add('open');}
function previewImgs(input){
  imgFiles=Array.from(input.files).slice(0,4);
  document.getElementById('imgPreview').innerHTML=imgFiles.map((f,i)=>{
    const url=URL.createObjectURL(f);
    return`<div class="img-prev"><img src="${url}"><button onclick="removeImg(${i})">✕</button></div>`;
  }).join('');
}
function removeImg(idx){
  imgFiles.splice(idx,1);
  document.getElementById('imgPreview').innerHTML=imgFiles.map((f,i)=>{
    const url=URL.createObjectURL(f);
    return`<div class="img-prev"><img src="${url}"><button onclick="removeImg(${i})">✕</button></div>`;
  }).join('');
}
async function submitPost(){
  const title=document.getElementById('postTitle').value.trim();
  if(!title){showToast('⚠️ أدخل عنوان المنشور');return;}
  const btn=document.getElementById('postBtn');
  btn.disabled=true;btn.textContent='جاري النشر...';
  let urls=[];
  for(const file of imgFiles){
    const ext=file.name.split('.').pop();
    const path=`${currentUser.id}/${Date.now()}.${ext}`;
    const{data,error}=await sb.storage.from('posts').upload(path,file,{upsert:true});
    if(!error){const{data:u}=sb.storage.from('posts').getPublicUrl(path);urls.push(u.publicUrl);}
  }
  const{error}=await sb.from('posts').insert({user_id:currentUser.id,title,destination:document.getElementById('postDest').value.trim(),content:document.getElementById('postContent').value.trim(),images:urls,likes:0});
  btn.disabled=false;btn.textContent='🚀 نشر المنشور';
  if(error){showToast('❌ '+error.message);return;}
  document.getElementById('postOverlay').classList.remove('open');
  document.getElementById('postTitle').value='';document.getElementById('postDest').value='';document.getElementById('postContent').value='';
  document.getElementById('imgPreview').innerHTML='';imgFiles=[];
  showToast('🎉 تم نشر منشورك!');
  await loadPosts();
}

// ══ COUNTRIES ══
function openCountriesModal(){renderCountriesList('');document.getElementById('countriesOverlay').classList.add('open');}
function filterCountries(q){renderCountriesList(q);}
function renderCountriesList(q){
  const fl=ALL_COUNTRIES.filter(c=>!q||c.n.includes(q));
  document.getElementById('countriesList').innerHTML=fl.map(c=>`
    <div class="country-opt ${selCountries.includes(c.n)?'sel':''}" onclick="toggleCountry('${c.n}',this)">
      <span class="cn">${c.f} ${c.n}</span><span class="ck">✓</span>
    </div>`).join('');
}
function toggleCountry(name,el){
  if(selCountries.includes(name)){selCountries=selCountries.filter(c=>c!==name);el.classList.remove('sel');}
  else{selCountries.push(name);el.classList.add('sel');}
}
async function saveCountries(){
  const{error}=await sb.from('profiles').upsert({id:currentUser.id,visited_countries:selCountries,account_type:profile?.account_type||'traveler'});
  if(error){showToast('❌ '+error.message);return;}
  document.getElementById('countriesOverlay').classList.remove('open');
  profile={...profile,visited_countries:selCountries};
  renderFlags();
  showToast(`✅ تم حفظ ${toAr(selCountries.length)} دول!`);
}
function renderFlags(){
  const wrap=document.getElementById('flagsWrap');
  const tags=selCountries.map(c=>{
    const found=ALL_COUNTRIES.find(x=>x.n===c);
    return`<span class="flag-tag">${found?found.f:''} ${c}</span>`;
  }).join('');
  wrap.innerHTML=tags+`<button class="add-flag" onclick="openCountriesModal()">+ إضافة</button>`;
}

// ══ LOGOUT ══
async function doLogout(){
  await sb.auth.signOut();
  showToast('👋 تم تسجيل الخروج');
  setTimeout(()=>window.location.href='index.html',1500);
}

// ══ HELPERS ══
function closeOverlay(id,e){if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');}
function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

init();
</script>
