<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — الرحلات</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:60px;--bot-h:68px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-bottom:calc(var(--bot-h)+20px);}

/* NAV */


.post-btn{padding:8px 18px;border-radius:24px;background:var(--or);color:white;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;border:none;cursor:pointer;}

/* MAIN */
.main{padding:calc(var(--nav-h)+24px) 20px 0;}
.page-title{font-size:26px;font-weight:900;margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:20px;}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:12px 16px;margin-bottom:16px;}
.search-box input{flex:1;background:transparent;border:none;font-family:'Tajawal',sans-serif;font-size:14px;color:white;outline:none;}
.search-box input::placeholder{color:rgba(255,255,255,0.2);}

/* FILTERS */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{white-space:nowrap;padding:8px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.6);transition:all .2s;}
.fchip.active,.fchip:hover{background:var(--or);color:white;border-color:var(--or);}

/* GRID */
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}

/* CARD */
.tcard{background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--border);transition:all .3s;cursor:pointer;}
.tcard:hover{transform:translateY(-6px);border-color:var(--or);box-shadow:0 16px 40px rgba(255,92,26,0.15);}
.tc-img{height:155px;display:flex;align-items:center;justify-content:center;font-size:54px;position:relative;}
.tc-seats{position:absolute;top:12px;left:12px;padding:5px 12px;border-radius:12px;font-size:11px;font-weight:800;}
.tc-dest{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.5);color:white;padding:5px 12px;border-radius:12px;font-size:12px;font-weight:700;backdrop-filter:blur(8px);}
.tc-body{padding:16px;}
.tc-title{font-size:15px;font-weight:800;margin-bottom:8px;line-height:1.3;}
.tc-meta{display:flex;gap:12px;margin-bottom:12px;}
.tc-meta span{font-size:12px;color:var(--muted);}
.tc-foot{display:flex;justify-content:space-between;align-items:center;}
.tc-org{display:flex;align-items:center;gap:8px;}
.tc-av{width:26px;height:26px;border-radius:50%;background:rgba(255,92,26,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;}
.tc-org span{font-size:12px;color:var(--muted);}
.tc-join{padding:7px 16px;border-radius:12px;background:var(--or);color:white;border:none;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;grid-column:1/-1;}
.empty .ei{font-size:52px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--muted);margin-bottom:20px;}
.empty button{padding:12px 28px;border-radius:20px;background:var(--or);color:white;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

/* BOTTOM NAV */






/* TOAST */
.toast{position:fixed;bottom:calc(var(--bot-h)+16px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:12px 22px;border-radius:22px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border:1px solid rgba(255,255,255,0.08);}
.toast.show{transform:translateX(-50%) translateY(0);}
/* ── SHARED NAV ── */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,#FF5C1A,#FFD000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;padding:0;}
.nav-profile-btn{padding:7px 16px;border-radius:20px;background:rgba(255,92,26,0.12);border:1.5px solid rgba(255,92,26,0.25);color:#FF5C1A;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s;}
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom);}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;transition:all .2s;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}
.bitem.active .bl{color:#FF5C1A;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-profile-btn" id="navProfileBtn" onclick="goToProfile()">تسجيل دخول 👤</button>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="page-title">✈️ الرحلات</div>
  <div class="page-sub">انضم لرحلة منظمة من مسافرين مثلك — بدون إلزام، فقط رفقة</div>

  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن وجهة..." oninput="applyFilter()">
  </div>

  <div class="filter-row">
    <button class="fchip active" onclick="setFilter('الكل',this)">🌍 الكل</button>
    <button class="fchip" onclick="setFilter('مغامرة',this)">🔥 مغامرة</button>
    <button class="fchip" onclick="setFilter('شاطئ',this)">🌊 شاطئ</button>
    <button class="fchip" onclick="setFilter('ثقافة',this)">🏛️ ثقافة</button>
    <button class="fchip" onclick="setFilter('طبيعة',this)">🌿 طبيعة</button>
    <button class="fchip" onclick="setFilter('طعام',this)">🍜 طعام</button>
  </div>

  <div class="trips-grid" id="grid">
    <div class="empty" style="grid-column:1/-1">
      <div class="ei">⏳</div>
      <h3>جاري التحميل...</h3>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem active"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div class="bl">طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🤝</div><div class="bl">المساعدون</div></a>
</nav>

<div class="toast" id="toast"></div>

<script>
const{createClient}=supabase;
const sb=createClient(
  'https://ybjdagurvkweabujkeyz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI'
);
// ── NAV FUNCTIONS ──
async function goToProfile(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    window.location.href=session?'profile.html':'auth.html';
  }catch(e){window.location.href='auth.html';}
}
async function initNav(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    const btn=document.getElementById('navProfileBtn');
    if(!btn) return;
    if(session){
      const{data:p}=await sb.from('profiles').select('full_name').eq('id',session.user.id).single();
      btn.textContent=(p?.full_name?.split(' ')[0]||'ملفي')+' 👤';
    }else{
      btn.textContent='تسجيل دخول 👤';
    }
  }catch(e){
    const btn=document.getElementById('navProfileBtn');
    if(btn) btn.textContent='تسجيل دخول 👤';
  }
}
initNav();


const GRADS={
  '✈️':'linear-gradient(135deg,#1A6BFF,#00C9B1)',
  '🏔️':'linear-gradient(135deg,#5B7FBF,#92A8D1)',
  '🌊':'linear-gradient(135deg,#26A69A,#80CBC4)',
  '🏛️':'linear-gradient(135deg,#EF6C00,#FFA726)',
  '🌴':'linear-gradient(135deg,#2E7D32,#66BB6A)',
  '🗼':'linear-gradient(135deg,#1565C0,#42A5F5)',
  '🦁':'linear-gradient(135deg,#558B2F,#8BC34A)',
  '⛰️':'linear-gradient(135deg,#4E342E,#8D6E63)',
  '🏝️':'linear-gradient(135deg,#00838F,#4DD0E1)',
  '🌸':'linear-gradient(135deg,#AD1457,#F48FB1)',
  '🎭':'linear-gradient(135deg,#6A1B9A,#CE93D8)',
  '🍜':'linear-gradient(135deg,#E65100,#FFCC02)',
};

let all=[], filtered=[], activeFilter='الكل';

async function init(){
  const{data,error}=await sb
    .from('trips')
    .select('id,title,destination,country,emoji,date,duration,seats,seats_taken,tags')
    .eq('status','active')
    .order('created_at',{ascending:false});

  const grid=document.getElementById('grid');
  if(error){
    grid.innerHTML=`<div class="empty"><div class="ei">⚠️</div><h3>تعذّر التحميل</h3><p>${error.message}</p><button onclick="init()">إعادة المحاولة</button></div>`;
    return;
  }
  all=data||[];
  filtered=all;
  render();
}

function render(){
  const grid=document.getElementById('grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty"><div class="ei">🗺️</div><h3>لا توجد رحلات بعد</h3><p>كن أول من ينشر رحلة!</p><button onclick="window.location.href='post-trip.html'">+ انشر رحلتك</button></div>`;
    return;
  }
  grid.innerHTML=filtered.map(t=>{
    const grad=GRADS[t.emoji]||'linear-gradient(135deg,#FF5C1A,#FFD000)';
    const left=(t.seats||5)-(t.seats_taken||0);
    const ss=left<=2?'background:rgba(229,57,53,0.25);color:#ff6b6b':'background:rgba(0,201,177,0.18);color:#00C9B1';
    const st=left<=2?`⚠️ ${toAr(left)} فقط`:`✅ ${toAr(left)} أماكن`;
    const dt=t.date?new Date(t.date).toLocaleDateString('ar-KW',{day:'numeric',month:'long'}):'';
    return`<div class="tcard" onclick="window.location.href='trip.html?id=${t.id}'">
      <div class="tc-img" style="background:${grad}">
        <span>${t.emoji||'✈️'}</span>
        <div class="tc-seats" style="${ss}">${st}</div>
        <div class="tc-dest">${t.country||''}</div>
      </div>
      <div class="tc-body">
        <div class="tc-title">${t.title||''}</div>
        <div class="tc-meta"><span>📅 ${dt}</span><span>⏱ ${t.duration||''}</span></div>
        <div class="tc-foot">
          <div class="tc-org"><div class="tc-av">✈️</div><span>${t.destination||''}</span></div>
          <button class="tc-join" onclick="event.stopPropagation();window.location.href='trip.html?id=${t.id}'">انضم ✈️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(tag,el){
  activeFilter=tag;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  filtered=all.filter(t=>{
    const mq=!q||t.title?.toLowerCase().includes(q)||t.country?.toLowerCase().includes(q)||t.destination?.toLowerCase().includes(q);
    const mf=activeFilter==='الكل'||(Array.isArray(t.tags)&&t.tags.includes(activeFilter));
    return mq&&mf;
  });
  render();
}

function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}

async function goToProfile(){
  const{data:{session}}=await sb.auth.getSession();
  window.location.href=session?'profile.html':'auth.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

init();
</script>
</body>
</html>
