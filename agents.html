<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — مساعدو السفريات</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
async function goToProfile(){
  try{const{data:{session}}=await sb.auth.getSession();window.location.href=session?'profile.html':'auth.html';}
  catch(e){window.location.href='auth.html';}
}
async function initNav(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    const btn=document.getElementById('navProfileBtn');
    if(!btn||!session) return;
    const{data:p}=await sb.from('profiles').select('full_name').eq('id',session.user.id).single();
    const name=p?.full_name?.split(' ')[0]||'ملفي';
    btn.textContent=name+' 👤';
  }catch(e){}
}
initNav();
</script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:60px;--bot-h:68px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-bottom:calc(var(--bot-h)+20px);}

/* NAV */


.reg-btn{padding:8px 18px;border-radius:24px;background:var(--tl);color:var(--dk);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;border:none;cursor:pointer;}

/* MAIN */
.main{padding:calc(var(--nav-h)+24px) 20px 0;}
.page-title{font-size:26px;font-weight:900;margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:20px;}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:12px 16px;margin-bottom:16px;}
.search-box input{flex:1;background:transparent;border:none;font-family:'Tajawal',sans-serif;font-size:14px;color:white;outline:none;}
.search-box input::placeholder{color:rgba(255,255,255,0.2);}

/* FILTERS */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{white-space:nowrap;padding:8px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.6);transition:all .2s;}
.fchip.active,.fchip:hover{background:var(--tl);color:var(--dk);border-color:var(--tl);}

/* GRID */
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

/* CARD */
.acard{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .3s;cursor:pointer;}
.acard:hover{transform:translateY(-5px);border-color:var(--tl);box-shadow:0 14px 36px rgba(0,201,177,0.1);}
.acard-cover{height:72px;position:relative;}
.acard-av{position:absolute;bottom:-22px;right:16px;width:48px;height:48px;border-radius:14px;border:3px solid var(--dk);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;}
.verified{position:absolute;top:8px;left:8px;background:rgba(0,201,177,0.9);color:var(--dk);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:800;}
.acard-body{padding:30px 16px 16px;}
.acard-name{font-size:16px;font-weight:900;margin-bottom:4px;}
.acard-rating{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.stars{color:var(--yl);font-size:13px;}
.rnum{font-size:12px;font-weight:700;}
.rcnt{font-size:11px;color:var(--muted);}
.acard-bio{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.acard-svcs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.svc{padding:4px 10px;border-radius:9px;background:rgba(0,201,177,0.1);color:var(--tl);font-size:11px;font-weight:700;}
.acard-foot{display:flex;gap:8px;}
.contact-btn{flex:1;padding:10px;border-radius:12px;background:var(--tl);color:var(--dk);border:none;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
.rate-btn{padding:10px 12px;border-radius:12px;background:rgba(255,208,0,0.1);color:var(--yl);border:1px solid rgba(255,208,0,0.2);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;grid-column:1/-1;}
.empty .ei{font-size:52px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--muted);}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:#161616;border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .4s cubic-bezier(.34,1.2,.64,1);}
.overlay.open .sheet{transform:translateY(0);}
.sheet::-webkit-scrollbar{display:none;}
.handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:14px auto;}
.sheet-body{padding:0 20px 32px;}
.sheet-title{font-size:20px;font-weight:900;margin-bottom:4px;}
.sheet-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}

/* AGENT DETAIL */
.detail-cover{height:100px;border-radius:16px;margin-bottom:36px;position:relative;}
.detail-av{position:absolute;bottom:-24px;right:16px;width:56px;height:56px;border-radius:16px;border:3px solid #161616;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;}
.detail-name{font-size:20px;font-weight:900;margin-bottom:6px;}
.detail-rating{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.detail-bio{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.7;margin-bottom:18px;}
.sec-label{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
.svcs-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.svc-big{padding:8px 16px;border-radius:12px;background:rgba(0,201,177,0.1);color:var(--tl);font-size:13px;font-weight:700;border:1px solid rgba(0,201,177,0.2);}
.contact-links{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.clink{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:14px;border:1px solid var(--border);text-decoration:none;color:white;transition:all .2s;}
.clink:hover{border-color:var(--tl);}
.clink .ci{font-size:20px;}
.clink .ct strong{display:block;font-size:14px;font-weight:800;}
.clink .ct span{font-size:12px;color:var(--muted);}
.clink .ca{margin-right:auto;font-size:12px;color:var(--tl);font-weight:700;}

/* REVIEWS */
.reviews-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.rev-item{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);}
.rev-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rev-av{width:32px;height:32px;border-radius:10px;background:rgba(255,92,26,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;}
.rev-info strong{font-size:13px;font-weight:800;}
.rev-info span{font-size:11px;color:var(--muted);}
.rev-stars{margin-right:auto;color:var(--yl);font-size:13px;}
.rev-text{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;}
.add-rev-btn{width:100%;padding:12px;border-radius:14px;background:rgba(255,208,0,0.1);color:var(--yl);border:1.5px solid rgba(255,208,0,0.2);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px;}

/* FORM */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:800;color:rgba(255,255,255,0.55);margin-bottom:6px;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:13px 15px;border-radius:13px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);font-family:'Tajawal',sans-serif;font-size:14px;color:white;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--tl);}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,0.2);}
.field textarea{resize:vertical;min-height:85px;}
.field select option{background:#222;}
.svcs-check{display:flex;gap:8px;flex-wrap:wrap;}
.sc{padding:8px 13px;border-radius:11px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.55);transition:all .2s;}
.sc.on{background:rgba(0,201,177,0.15);color:var(--tl);border-color:rgba(0,201,177,0.3);}
.main-btn{width:100%;padding:14px;border-radius:15px;border:none;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:6px;}
.tl-btn{background:linear-gradient(135deg,var(--tl),#00a896);color:var(--dk);}
.or-btn{background:linear-gradient(135deg,var(--or),#ff8c42);color:white;}
.main-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* STARS */
.stars-row{display:flex;gap:10px;justify-content:center;margin:14px 0;}
.sbtn{font-size:34px;cursor:pointer;background:none;border:none;transition:transform .15s;}
.sbtn:hover,.sbtn.on{transform:scale(1.2);}
.star-lbl{text-align:center;font-size:13px;color:var(--muted);margin-bottom:14px;}

/* BOTTOM NAV */






/* TOAST */
.toast{position:fixed;bottom:calc(var(--bot-h)+16px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:12px 22px;border-radius:22px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border:1px solid rgba(255,255,255,0.08);}
.toast.show{transform:translateX(-50%) translateY(0);}
/* ── SHARED NAV ── */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,#FF5C1A,#FFD000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;padding:0;}
.nav-profile-btn{padding:7px 16px;border-radius:20px;background:rgba(255,92,26,0.12);border:1.5px solid rgba(255,92,26,0.25);color:#FF5C1A;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s;}
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom);}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;transition:all .2s;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}
.bitem.active .bl{color:#FF5C1A;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-profile-btn" id="navProfileBtn" onclick="goToProfile()">دخول 👤</button>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="page-title">🤝 مساعدو السفريات</div>

</div>

<!-- BOTTOM NAV -->
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>

  <a href="agents.html" class="bitem active"><div class="bi">🤝</div><div class="bl">المساعدون</div></a>
</nav>

<!-- AGENT DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="closeOverlay('detailOverlay',event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-body" id="detailBody"></div>
  </div>
</div>

<!-- REGISTER OVERLAY -->
<div class="overlay" id="regOverlay" onclick="closeOverlay('regOverlay',event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-body">
      <div class="sheet-title">🌟 سجّل كمساعد سفريات</div>
      <div class="sheet-sub">أنشئ ملفك واعرض خدماتك لآلاف المسافرين</div>

          <button class="sc" onclick="toggleSvc(this,'تذاكر طيران')">✈️ تذاكر طيران</button>

</div>

<!-- RATING OVERLAY -->
<div class="overlay" id="ratingOverlay" onclick="closeOverlay('ratingOverlay',event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-body">
      <div class="sheet-title" style="text-align:center">⭐ أضف تقييمك</div>
      <div class="sheet-sub" style="text-align:center">تقييمك يساعد المسافرين على الاختيار</div>
      <div class="stars-row" id="starsRow">
        <button class="sbtn" onclick="setStar(1)">☆</button>

        <button class="sbtn" onclick="setStar(3)">☆</button>

</div>

<script>
// ══ SUPABASE ══
const{createClient}=supabase;
const sb=createClient(
  'https://ybjdagurvkweabujkeyz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI'
);

const COLORS=[
  {bg:'#BBDEFB',tx:'#0D47A1'},{bg:'#F8BBD9',tx:'#880E4F'},
  {bg:'#C8E6C9',tx:'#1B5E20'},{bg:'#FFE0B2',tx:'#E65100'},
  {bg:'#E1BEE7',tx:'#6A1B9A'},{bg:'#FFF9C4',tx:'#F57F17'},
];

let allAgents=[], filtered=[], activeFilter='الكل';
let currentUser=null, selAgent=null, selStar=0, selSvcs=[];

// ══ INIT ══
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  currentUser=session?.user||null;
  if(currentUser){
    const{data:ag}=await sb.from('agents').select('id').eq('user_id',currentUser.id).single();
    if(ag) document.getElementById('regBtn').textContent='✏️ تعديل ملفي';
  }
  await fetchAgents();
}

// ══ FETCH ══
async function fetchAgents(){
  const{data,error}=await sb.from('agents').select('*').order('rating_avg',{ascending:false});
  const grid=document.getElementById('grid');
  if(error){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ei">⚠️</div><h3>تعذّر التحميل</h3><p>${error.message}</p></div>`;
    return;
  }
  allAgents=data||[];
  filtered=allAgents;
  render();
}

// ══ RENDER ══
function render(){
  const grid=document.getElementById('grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ei">🤝</div><h3>لا يوجد مساعدون بعد</h3><p>كن أول مساعد سفريات في رِحلة!</p></div>`;
    return;
  }
  grid.innerHTML=filtered.map((a,i)=>{
    const c=COLORS[i%COLORS.length];
    const ini=a.full_name.split(' ').map(w=>w[0]).join('').substring(0,2);
    const st='⭐'.repeat(Math.round(a.rating_avg||0))||'☆☆☆☆☆';
    const rv=a.rating_avg>0?a.rating_avg.toFixed(1):'جديد';
    return`<div class="acard" onclick="openDetail('${a.id}')">
      <div class="acard-cover" style="background:linear-gradient(135deg,${c.bg}33,${c.tx}22)">
        ${a.is_verified?'<div class="verified">✓ موثّق</div>':''}
        <div class="acard-av" style="background:${c.bg};color:${c.tx}">${ini}</div>
      </div>
      <div class="acard-body">
        <div class="acard-name">${a.full_name}</div>
        <div class="acard-rating"><span class="stars">${st}</span><span class="rnum">${rv}</span><span class="rcnt">(${a.rating_count||0})</span></div>
        <div class="acard-bio">${a.bio||'مساعد سفريات محترف'}</div>
        <div class="acard-svcs">${(a.services||[]).map(s=>`<span class="svc">${s}</span>`).join('')}</div>
        <div class="acard-foot">
          <button class="contact-btn" onclick="event.stopPropagation();openDetail('${a.id}')">تواصل معه</button>
          <button class="rate-btn" onclick="event.stopPropagation();openRating('${a.id}')">⭐ قيّم</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══ FILTER ══
function setFilter(tag,el){
  activeFilter=tag;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}
function applyFilter(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  filtered=allAgents.filter(a=>{
    const mq=!q||a.full_name.toLowerCase().includes(q)||(a.bio||'').toLowerCase().includes(q);
    const mf=activeFilter==='الكل'||(a.services||[]).includes(activeFilter);
    return mq&&mf;
  });
  render();
}

// ══ OPEN DETAIL ══
async function openDetail(id){
  const a=allAgents.find(x=>x.id===id);
  if(!a) return;
  selAgent=a;
  const i=allAgents.indexOf(a)%COLORS.length;
  const c=COLORS[i];
  const ini=a.full_name.split(' ').map(w=>w[0]).join('').substring(0,2);
  const st='⭐'.repeat(Math.round(a.rating_avg||0))||'☆☆☆☆☆';
  const rv=a.rating_avg>0?a.rating_avg.toFixed(1):'جديد';

  // Contact links
  let contacts='';
  if(a.whatsapp) contacts+=`<a class="clink" href="https://wa.me/${a.whatsapp.replace(/\D/g,'')}" target="_blank"><span class="ci">📱</span><div class="ct"><strong>واتساب</strong><span>${a.whatsapp}</span></div><span class="ca">فتح ←</span></a>`;
  if(a.instagram) contacts+=`<a class="clink" href="https://instagram.com/${a.instagram.replace('@','')}" target="_blank"><span class="ci">📸</span><div class="ct"><strong>إنستغرام</strong><span>${a.instagram}</span></div><span class="ca">فتح ←</span></a>`;
  if(!contacts) contacts=`<div style="font-size:13px;color:var(--muted);padding:10px">لم يضف معلومات تواصل بعد</div>`;

  // Reviews
  const{data:revs}=await sb.from('reviews').select('*').eq('target_id',id).eq('target_type','agent').order('created_at',{ascending:false}).limit(5);
  let revsHtml='<div style="font-size:13px;color:var(--muted);padding:10px;text-align:center">لا توجد تقييمات بعد</div>';
  if(revs&&revs.length>0){
    revsHtml=`<div class="reviews-wrap">${revs.map(r=>`
      <div class="rev-item">
        <div class="rev-head">
          <div class="rev-av">👤</div>
          <div class="rev-info"><strong>مسافر</strong><span>${new Date(r.created_at).toLocaleDateString('ar-KW',{month:'long',year:'numeric'})}</span></div>
          <div class="rev-stars">${'⭐'.repeat(r.rating)}</div>
        </div>
        ${r.comment?`<div class="rev-text">${r.comment}</div>`:''}
      </div>`).join('')}</div>`;
  }

  const showRevBtn=currentUser&&currentUser.id!==a.user_id;

  document.getElementById('detailBody').innerHTML=`
    <div class="detail-cover" style="background:linear-gradient(135deg,${c.bg}33,${c.tx}22)">
      <div class="detail-av" style="background:${c.bg};color:${c.tx}">${ini}</div>
    </div>
    <div class="detail-name">${a.full_name}${a.is_verified?' ✓':''}</div>
    <div class="detail-rating">
      <span style="color:var(--yl);font-size:17px">${st}</span>
      <span style="font-size:13px;font-weight:700">${rv}</span>
      <span style="font-size:12px;color:var(--muted)">(${a.rating_count||0} تقييم)</span>
    </div>
    <div class="detail-bio">${a.bio||'مساعد سفريات محترف'}</div>
    <div class="sec-label">الخدمات</div>
    <div class="svcs-wrap">${(a.services||[]).map(s=>`<span class="svc-big">${s}</span>`).join('')}</div>
    <div class="sec-label">تواصل معه</div>
    <div class="contact-links">${contacts}</div>
    <div class="sec-label">التقييمات</div>
    ${revsHtml}
    ${showRevBtn?`<button class="add-rev-btn" onclick="closeOverlay('detailOverlay',{target:null});setTimeout(()=>openRating('${a.id}'),300)">⭐ أضف تقييمك</button>`:''}
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

// ══ REGISTER ══
function openRegister(){
  if(!currentUser){window.location.href='auth.html';return;}
  document.getElementById('regOverlay').classList.add('open');
}

function toggleSvc(el,svc){
  if(selSvcs.includes(svc)){selSvcs=selSvcs.filter(s=>s!==svc);el.classList.remove('on');}
  else{selSvcs.push(svc);el.classList.add('on');}
}

async function saveAgent(){
  const btn=document.getElementById('saveAgBtn');
  const name=document.getElementById('agName').value.trim();
  const bio=document.getElementById('agBio').value.trim();
  const wa=document.getElementById('agWa').value.trim();
  const ig=document.getElementById('agIg').value.trim();
  const exp=parseInt(document.getElementById('agExp').value);
  if(!name){showToast('⚠️ أدخل اسمك');return;}
  if(selSvcs.length===0){showToast('⚠️ اختر خدمة واحدة على الأقل');return;}
  btn.disabled=true;btn.textContent='جاري الحفظ...';
  const{error}=await sb.from('agents').upsert({user_id:currentUser.id,full_name:name,bio,services:selSvcs,whatsapp:wa,instagram:ig,experience_years:exp});
  btn.disabled=false;btn.textContent='🚀 إنشاء الملف';
  if(error){showToast('❌ '+error.message);return;}

  // تحديث نوع الحساب في الملف الشخصي
  await sb.from('profiles').upsert({id:currentUser.id,account_type:'agent',full_name:name});
  document.getElementById('regOverlay').classList.remove('open');
  showToast('🎉 تم إنشاء ملفك بنجاح!');
  await fetchAgents();
}

// ══ RATING ══
function openRating(id){
  if(!currentUser){window.location.href='auth.html';return;}
  selAgent=allAgents.find(x=>x.id===id)||selAgent;
  selStar=0;
  updateStars();
  document.getElementById('revComment').value='';
  document.getElementById('starLbl').textContent='اضغط على النجوم لتقييم';
  document.getElementById('ratingOverlay').classList.add('open');
}

function setStar(n){
  selStar=n;
  updateStars();
  const lbls=['','ضعيف 😞','مقبول 😐','جيد 🙂','جيد جداً 😊','ممتاز 🤩'];
  document.getElementById('starLbl').textContent=lbls[n];
}

function updateStars(){
  document.querySelectorAll('.sbtn').forEach((b,i)=>{b.textContent=i<selStar?'⭐':'☆';});
}

async function saveReview(){
  if(!selStar){showToast('⚠️ اختر عدد النجوم');return;}
  const btn=document.getElementById('saveRevBtn');
  const comment=document.getElementById('revComment').value.trim();
  btn.disabled=true;btn.textContent='جاري الإرسال...';
  const{error}=await sb.from('reviews').upsert({
    reviewer_id:currentUser.id,
    target_id:selAgent.id,
    target_type:'agent',
    rating:selStar,
    comment
  });
  btn.disabled=false;btn.textContent='إرسال التقييم ⭐';
  if(error){showToast('❌ '+error.message);return;}

  // تحديث متوسط التقييم
  const{data:revs}=await sb.from('reviews').select('rating').eq('target_id',selAgent.id).eq('target_type','agent');
  if(revs&&revs.length>0){
    const avg=revs.reduce((s,r)=>s+r.rating,0)/revs.length;
    await sb.from('agents').update({rating_avg:avg,rating_count:revs.length}).eq('id',selAgent.id);
  }

  document.getElementById('ratingOverlay').classList.remove('open');
  showToast('✅ شكراً على تقييمك!');
  await fetchAgents();
}

// ══ HELPERS ══
function closeOverlay(id,e){
  if(!e||e.target===document.getElementById(id))
    document.getElementById(id).classList.remove('open');
}

async function goToProfile(){
  const{data:{session}}=await sb.auth.getSession();
  window.location.href=session?'profile.html':'auth.html';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

init();
</script>
</body>
</html>
