<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — دردشة المجموعة</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--input-h:72px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-top:var(--nav-h);padding-bottom:var(--input-h);}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-left{display:flex;align-items:center;gap:8px;}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.trip-meta{display:flex;align-items:center;gap:8px;}
.trip-emoji{font-size:22px;}
.trip-info{display:flex;flex-direction:column;}
.trip-name{font-size:13px;font-weight:800;}
.trip-members{font-size:10px;color:var(--muted);}
.nav-profile-btn{padding:7px 14px;border-radius:20px;background:rgba(255,92,26,0.12);border:1.5px solid rgba(255,92,26,0.25);color:var(--or);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}

/* MESSAGES */
.messages-area{padding:16px;display:flex;flex-direction:column;gap:10px;min-height:calc(100vh - var(--nav-h) - var(--input-h));}
.msg-wrap{display:flex;gap:8px;align-items:flex-end;animation:msgIn .25s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-wrap.mine{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-bottom:2px;}
.msg-content{max-width:72%;}
.msg-sender{font-size:11px;font-weight:800;color:var(--tl);margin-bottom:3px;}
.msg-wrap.mine .msg-sender{text-align:left;color:var(--or);}
.bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;}
.bubble-other{background:rgba(255,255,255,0.08);border-radius:4px 18px 18px 18px;}
.bubble-mine{background:linear-gradient(135deg,var(--or),#ff8c42);border-radius:18px 4px 18px 18px;}
.msg-time{font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px;}
.msg-wrap.mine .msg-time{text-align:left;}

/* LOADING */
.loading-msgs{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,92,26,0.2);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY */
.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px;}
.empty-chat .eicon{font-size:56px;margin-bottom:16px;}
.empty-chat h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty-chat p{font-size:13px;color:var(--muted);line-height:1.7;}

/* INPUT - FIXED AT BOTTOM */
.input-area{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:var(--input-h);padding:12px 16px;background:rgba(14,14,14,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.msg-input{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:12px 18px;font-family:'Tajawal',sans-serif;font-size:14px;color:white;outline:none;resize:none;max-height:80px;line-height:1.4;}
.msg-input:focus{border-color:var(--or);}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--or),#ff8c42);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* NOT LOGGED */
.not-logged{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px;}
.not-logged .icon{font-size:56px;margin-bottom:16px;}
.not-logged h2{font-size:22px;font-weight:900;margin-bottom:8px;}
.not-logged p{font-size:13px;color:var(--muted);margin-bottom:24px;}
.auth-btn{padding:14px 32px;border-radius:28px;background:var(--or);color:white;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;border:none;cursor:pointer;}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <button class="back-btn" onclick="window.history.back()">→</button>
    <div class="trip-meta">
      <span class="trip-emoji" id="tripEmoji">✈️</span>
      <div class="trip-info">
        <div class="trip-name" id="tripName">دردشة المجموعة</div>
        <div class="trip-members" id="tripMembers">جاري التحميل...</div>
      </div>
    </div>
  </div>
  <button class="nav-profile-btn" id="navProfileBtn" onclick="goToProfile()">تسجيل دخول 👤</button>
</nav>

<div class="messages-area" id="messagesArea">
  <div class="loading-msgs">
    <div class="spinner"></div>
    <p style="font-size:13px;color:var(--muted)">جاري تحميل الرسائل...</p>
  </div>
</div>

<div class="input-area" id="inputArea">
  <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالة..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');

const COLORS=[
  {bg:'#FFE0B2',tx:'#E65100'},{bg:'#E1BEE7',tx:'#6A1B9A'},
  {bg:'#C8E6C9',tx:'#1B5E20'},{bg:'#BBDEFB',tx:'#0D47A1'},
  {bg:'#F8BBD9',tx:'#880E4F'},{bg:'#FFF9C4',tx:'#F57F17'},
];

let currentUser=null, trip=null, tripId=null;
let userColors={}, userProfiles={}, messageIds=new Set();

function getTripId(){
  return new URLSearchParams(window.location.search).get('id');
}

async function goToProfile(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    window.location.href=session?'profile.html':'auth.html';
  }catch(e){window.location.href='auth.html';}
}

async function initNav(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    const btn=document.getElementById('navProfileBtn');
    if(!btn) return;
    if(session){
      const{data:p}=await sb.from('profiles').select('full_name').eq('id',session.user.id).maybeSingle();
      btn.textContent=(p?.full_name?.split(' ')[0]||'ملفي')+' 👤';
    }
  }catch(e){}
}

// ══ INIT ══
async function init(){
  try{
    tripId=getTripId();
    if(!tripId){window.location.href='index.html';return;}

    const{data:{session}}=await sb.auth.getSession();
    if(!session){
      showNotLogged();
      return;
    }
    currentUser=session.user;

    // جلب بيانات الرحلة
    const{data:t,error:tripErr}=await sb.from('trips').select('*').eq('id',tripId).maybeSingle();
    if(tripErr||!t){
      document.getElementById('messagesArea').innerHTML='<div class="empty-chat"><div class="eicon">⚠️</div><h3>الرحلة غير موجودة</h3></div>';
      return;
    }
    trip=t;

    // تحديث الـ nav
    document.getElementById('tripName').textContent=t.title||'دردشة المجموعة';
    document.getElementById('tripEmoji').textContent=t.emoji||'✈️';

    // جلب عدد الأعضاء
    try{
      const{count}=await sb.from('join_requests')
        .select('*',{count:'exact',head:true})
        .eq('trip_id',tripId)
        .eq('status','accepted');
      document.getElementById('tripMembers').textContent=`${(count||0)+1} أعضاء`;
    }catch(e){
      document.getElementById('tripMembers').textContent='دردشة المجموعة';
    }

    // تحميل الرسائل
    await loadMessages();

    // إظهار خانة الكتابة
    document.getElementById('inputArea').style.display='flex';

    // تحديث تلقائي كل 3 ثوان
    setInterval(loadNewMessages,3000);
  }catch(err){
    console.error('Init error:',err);
    document.getElementById('messagesArea').innerHTML=`<div class="empty-chat"><div class="eicon">⚠️</div><h3>حدث خطأ</h3><p>${err.message}</p></div>`;
  }
}

// ══ LOAD MESSAGES ══
async function loadMessages(){
  const area=document.getElementById('messagesArea');
  const{data,error}=await sb.from('messages').select('*')
    .eq('trip_id',tripId).order('created_at',{ascending:true}).limit(100);

  if(error){
    area.innerHTML=`<div class="empty-chat"><div class="eicon">⚠️</div><h3>تعذّر التحميل</h3><p>${error.message}</p></div>`;
    return;
  }

  if(!data||data.length===0){
    area.innerHTML=`<div class="empty-chat"><div class="eicon">💬</div><h3>لا توجد رسائل بعد</h3><p>كن أول من يبدأ المحادثة!</p></div>`;
    return;
  }

  // جلب بيانات المرسلين
  const senderIds=[...new Set(data.map(m=>m.user_id))];
  await fetchProfiles(senderIds);

  area.innerHTML='';
  data.forEach(m=>{
    messageIds.add(m.id);
    appendMessage(m);
  });
  scrollToBottom();
}

// ══ LOAD NEW MESSAGES (polling) ══
async function loadNewMessages(){
  if(!tripId||!currentUser) return;
  try{
    const{data}=await sb.from('messages').select('*')
      .eq('trip_id',tripId).order('created_at',{ascending:true}).limit(100);
    if(!data) return;

    const newMsgs=data.filter(m=>!messageIds.has(m.id));
    if(newMsgs.length===0) return;

    const area=document.getElementById('messagesArea');
    const wasAtBottom=area.scrollTop+area.clientHeight>=area.scrollHeight-50;

    // جلب بيانات المرسلين الجدد
    const newSenderIds=[...new Set(newMsgs.map(m=>m.user_id).filter(id=>!userProfiles[id]))];
    if(newSenderIds.length>0) await fetchProfiles(newSenderIds);

    // إزالة "لا توجد رسائل" إن وُجدت
    const emptyEl=area.querySelector('.empty-chat');
    if(emptyEl) emptyEl.remove();

    newMsgs.forEach(m=>{
      messageIds.add(m.id);
      appendMessage(m);
    });

    if(wasAtBottom) scrollToBottom();
  }catch(e){console.error('Poll error:',e);}
}

// ══ FETCH PROFILES ══
async function fetchProfiles(userIds){
  if(!userIds||userIds.length===0) return;
  const{data}=await sb.from('profiles').select('id,full_name,avatar').in('id',userIds);
  if(data) data.forEach(p=>userProfiles[p.id]=p);
}

// ══ APPEND MESSAGE ══
function appendMessage(msg){
  const area=document.getElementById('messagesArea');
  const isMine=msg.user_id===currentUser.id;
  const profile=userProfiles[msg.user_id]||{};
  const name=profile.full_name||'مستخدم';
  const avatar=profile.avatar||name.substring(0,2);

  if(!userColors[msg.user_id]){
    userColors[msg.user_id]=COLORS[Object.keys(userColors).length%COLORS.length];
  }
  const color=userColors[msg.user_id];

  const time=new Date(msg.created_at).toLocaleTimeString('ar-KW',{hour:'numeric',minute:'2-digit'});

  const div=document.createElement('div');
  div.className=`msg-wrap ${isMine?'mine':''}`;
  div.innerHTML=`
    <div class="msg-av" style="background:${color.bg};color:${color.tx};cursor:${isMine?'default':'pointer'}" ${!isMine?`onclick="openUserProfile('${msg.user_id}')"`:''}>${avatar}</div>
    <div class="msg-content">
      ${!isMine?`<div class="msg-sender" style="cursor:pointer" onclick="openUserProfile('${msg.user_id}')">${name}</div>`:''}
      <div class="bubble ${isMine?'bubble-mine':'bubble-other'}">${escHtml(msg.content)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  area.appendChild(div);
}

function openUserProfile(userId){
  if(!userId||userId===currentUser?.id) return;
  window.location.href='user.html?id='+userId;
}

// ══ SEND MESSAGE ══
async function sendMessage(){
  const input=document.getElementById('msgInput');
  const content=input.value.trim();
  if(!content) return;

  const btn=document.getElementById('sendBtn');
  btn.disabled=true;
  input.value='';
  input.style.height='auto';

  const{data,error}=await sb.from('messages').insert({
    trip_id:tripId,
    user_id:currentUser.id,
    content
  }).select('*').single();

  btn.disabled=false;

  if(error){
    input.value=content;
    alert('❌ تعذّر إرسال الرسالة: '+error.message);
    return;
  }

  // أضف الرسالة فوراً
  if(data&&!messageIds.has(data.id)){
    messageIds.add(data.id);
    // أزل "لا توجد رسائل"
    const emptyEl=document.querySelector('.empty-chat');
    if(emptyEl) emptyEl.remove();
    appendMessage(data);
    scrollToBottom();
  }
}

// ══ NOT LOGGED ══
function showNotLogged(){
  document.getElementById('messagesArea').innerHTML=`
    <div class="not-logged">
      <div class="icon">💬</div>
      <h2>سجّل دخولك</h2>
      <p>تحتاج حساباً للمشاركة في الدردشة</p>
      <button class="auth-btn" onclick="window.location.href='auth.html'">تسجيل / دخول ✈️</button>
    </div>`;
}

// ══ HELPERS ══
function scrollToBottom(){
  const area=document.getElementById('messagesArea');
  setTimeout(()=>area.scrollTop=area.scrollHeight,50);
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,80)+'px';
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

initNav();
init();
</script>
</body>
</html>
