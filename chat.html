<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — دردشة المجموعة</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--input-h:72px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* NAV */

.back-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.trip-info{flex:1;min-width:0;}
.trip-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trip-members{font-size:11px;color:var(--muted);}
.trip-emoji{font-size:28px;flex-shrink:0;}

/* MESSAGES AREA */
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.messages-area::-webkit-scrollbar{width:3px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(255,92,26,0.3);border-radius:3px;}

/* DATE DIVIDER */
.date-div{text-align:center;margin:8px 0;}
.date-div span{background:rgba(255,255,255,0.06);color:var(--muted);font-size:11px;font-weight:700;padding:4px 12px;border-radius:12px;}

/* MESSAGE BUBBLE */
.msg-wrap{display:flex;gap:8px;align-items:flex-end;animation:msgIn .25s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-wrap.mine{flex-direction:row-reverse;}

.msg-av{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-bottom:2px;}

.msg-content{max-width:72%;}
.msg-sender{font-size:11px;font-weight:800;color:var(--tl);margin-bottom:3px;}
.msg-wrap.mine .msg-sender{text-align:left;color:var(--or);}

.bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;}
.bubble-other{background:rgba(255,255,255,0.08);border-radius:4px 18px 18px 18px;}
.bubble-mine{background:linear-gradient(135deg,var(--or),#ff8c42);border-radius:18px 4px 18px 18px;}

.msg-time{font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px;}
.msg-wrap.mine .msg-time{text-align:left;}

/* SYSTEM MSG */
.sys-msg{text-align:center;font-size:12px;color:var(--muted);padding:4px 12px;background:rgba(255,255,255,0.04);border-radius:12px;margin:4px auto;max-width:80%;}

/* LOADING */
.loading-msgs{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,92,26,0.2);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY */
.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px;}
.empty-chat .eicon{font-size:56px;margin-bottom:16px;}
.empty-chat h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty-chat p{font-size:13px;color:var(--muted);line-height:1.7;}

/* NOT MEMBER */
.not-member{background:rgba(255,92,26,0.08);border:1px solid rgba(255,92,26,0.2);border-radius:16px;padding:16px 18px;margin:16px;text-align:center;}
.not-member p{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:12px;line-height:1.6;}
.not-member button{padding:10px 24px;border-radius:14px;background:var(--or);color:white;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

/* INPUT AREA */
.input-area{height:var(--input-h);padding:12px 16px;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.msg-input{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:12px 18px;font-family:'Tajawal',sans-serif;font-size:14px;color:white;outline:none;resize:none;max-height:80px;transition:border-color .2s;line-height:1.4;}
.msg-input:focus{border-color:var(--or);}
.msg-input::placeholder{color:rgba(255,255,255,0.2);}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--or),#ff8c42);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 4px 14px rgba(255,92,26,0.35);}
.send-btn:hover{transform:scale(1.08);}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* NOT LOGGED */
.not-logged{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px;}
.not-logged .icon{font-size:56px;margin-bottom:16px;}
.not-logged h2{font-size:22px;font-weight:900;margin-bottom:8px;}
.not-logged p{font-size:13px;color:var(--muted);margin-bottom:24px;}
.auth-btn{padding:14px 32px;border-radius:28px;background:var(--or);color:white;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;border:none;cursor:pointer;}

/* TYPING */
.typing{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.06);border-radius:16px;width:fit-content;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
/* ── SHARED NAV ── */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,#FF5C1A,#FFD000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;padding:0;}
.nav-profile-btn{padding:7px 16px;border-radius:20px;background:rgba(255,92,26,0.12);border:1.5px solid rgba(255,92,26,0.25);color:#FF5C1A;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s;}
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom);}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;transition:all .2s;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}
.bitem.active .bl{color:#FF5C1A;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-profile-btn" id="navProfileBtn" onclick="goToProfile()">تسجيل دخول 👤</button>
</nav>

<!-- MESSAGES -->
<div class="messages-area" id="messagesArea">
  <div class="loading-msgs">
    <div class="spinner"></div>
    <p style="font-size:13px;color:var(--muted)">جاري تحميل الرسائل...</p>
  </div>
</div>

<!-- INPUT -->
<div class="input-area" id="inputArea" style="display:none">
  <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالة..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script>
const{createClient}=supabase;
const sb=createClient(
  'https://ybjdagurvkweabujkeyz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI'
);
// ── NAV FUNCTIONS ──
async function goToProfile(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    window.location.href=session?'profile.html':'auth.html';
  }catch(e){window.location.href='auth.html';}
}
async function initNav(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    const btn=document.getElementById('navProfileBtn');
    if(!btn) return;
    if(session){
      const{data:p}=await sb.from('profiles').select('full_name').eq('id',session.user.id).single();
      btn.textContent=(p?.full_name?.split(' ')[0]||'ملفي')+' 👤';
    }else{
      btn.textContent='تسجيل دخول 👤';
    }
  }catch(e){
    const btn=document.getElementById('navProfileBtn');
    if(btn) btn.textContent='تسجيل دخول 👤';
  }
}
initNav();


const COLORS=[
  {bg:'#FFE0B2',tx:'#E65100'},{bg:'#E1BEE7',tx:'#6A1B9A'},
  {bg:'#C8E6C9',tx:'#1B5E20'},{bg:'#BBDEFB',tx:'#0D47A1'},
  {bg:'#F8BBD9',tx:'#880E4F'},{bg:'#FFF9C4',tx:'#F57F17'},
];

let currentUser=null, trip=null, tripId=null;
let userColors={}, messageIds=new Set();

function getTripId(){
  return new URLSearchParams(window.location.search).get('id');
}

// ── INIT ──
async function init(){
  tripId=getTripId();
  if(!tripId){window.location.href='index.html';return;}

  const{data:{session}}=await sb.auth.getSession();
  if(!session){
    showNotLogged();
    return;
  }
  currentUser=session.user;

  // جلب بيانات الرحلة
  const{data:t}=await sb.from('trips').select('*').eq('id',tripId).single();
  if(!t){window.location.href='index.html';return;}
  trip=t;

  // تحديث النav
  document.getElementById('tripName').textContent=t.title;
  document.getElementById('tripEmoji').textContent=t.emoji||'✈️';

  // جلب عدد الأعضاء
  const{count}=await sb.from('join_requests')
    .select('*',{count:'exact',head:true})
    .eq('trip_id',tripId)
    .eq('status','accepted');
  document.getElementById('tripMembers').textContent=`${(count||0)+1} أعضاء في المجموعة`;

  // تحميل الرسائل
  await loadMessages();

  // إظهار منطقة الإدخال
  document.getElementById('inputArea').style.display='flex';

  // الاشتراك في الرسائل الجديدة (Realtime)
  subscribeToMessages();
}

// ── LOAD MESSAGES ──
async function loadMessages(){
  const{data,error}=await sb
    .from('messages')
    .select('*')
    .eq('trip_id',tripId)
    .order('created_at',{ascending:true})
    .limit(100);

  const area=document.getElementById('messagesArea');

  if(error){
    area.innerHTML=`<div class="empty-chat"><div class="eicon">⚠️</div><h3>تعذّر التحميل</h3><p>${error.message}</p></div>`;
    return;
  }

  if(!data||data.length===0){
    area.innerHTML=`
      <div class="empty-chat">
        <div class="eicon">💬</div>
        <h3>لا توجد رسائل بعد</h3>
        <p>كن أول من يبدأ المحادثة مع مجموعة الرحلة!</p>
      </div>`;
    return;
  }

  area.innerHTML='';
  data.forEach(m=>{
    messageIds.add(m.id);
    appendMessage(m);
  });
  scrollToBottom();
}

// ── APPEND MESSAGE ──
function appendMessage(msg){
  const area=document.getElementById('messagesArea');

  // أزل رسالة "لا توجد رسائل" إذا كانت موجودة
  const empty=area.querySelector('.empty-chat');
  if(empty) empty.remove();

  const isMine=msg.user_id===currentUser?.id;
  const colorIdx=Object.keys(userColors).indexOf(msg.user_id);
  if(!(msg.user_id in userColors)){
    userColors[msg.user_id]=COLORS[Object.keys(userColors).length%COLORS.length];
  }
  const col=userColors[msg.user_id];
  const initials=msg.user_id.substring(0,2).toUpperCase();
  const time=new Date(msg.created_at).toLocaleTimeString('ar-KW',{hour:'2-digit',minute:'2-digit'});

  const wrap=document.createElement('div');
  wrap.className=`msg-wrap ${isMine?'mine':''}`;
  wrap.id=`msg-${msg.id}`;

  if(isMine){
    wrap.innerHTML=`
      <div class="msg-content">
        <div class="bubble bubble-mine">${escHtml(msg.content)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  } else {
    wrap.innerHTML=`
      <div class="msg-av" style="background:${col.bg};color:${col.tx}">${initials}</div>
      <div class="msg-content">
        <div class="msg-sender">${isMine?'أنت':'عضو'}</div>
        <div class="bubble bubble-other">${escHtml(msg.content)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  }

  area.appendChild(wrap);
}

// ── SEND MESSAGE ──
async function sendMessage(){
  const input=document.getElementById('msgInput');
  const content=input.value.trim();
  if(!content) return;

  const btn=document.getElementById('sendBtn');
  btn.disabled=true;
  input.value='';
  input.style.height='auto';

  const{error}=await sb.from('messages').insert({
    trip_id:tripId,
    user_id:currentUser.id,
    content
  });

  btn.disabled=false;

  if(error){
    input.value=content;
    showToast('❌ تعذّر إرسال الرسالة');
  }
}

// ── REALTIME ──
function subscribeToMessages(){
  sb.channel(`chat-${tripId}`)
    .on('postgres_changes',{
      event:'INSERT',
      schema:'public',
      table:'messages',
      filter:`trip_id=eq.${tripId}`
    }, payload=>{
      if(!messageIds.has(payload.new.id)){
        messageIds.add(payload.new.id);
        appendMessage(payload.new);
        scrollToBottom();
      }
    })
    .subscribe();
}

// ── NOT LOGGED ──
function showNotLogged(){
  document.getElementById('messagesArea').innerHTML=`
    <div class="not-logged">
      <div class="icon">💬</div>
      <h2>سجّل دخولك</h2>
      <p>تحتاج حساباً للمشاركة في دردشة المجموعة</p>
      <button class="auth-btn" onclick="window.location.href='auth.html'">تسجيل / دخول ✈️</button>
    </div>`;
  document.getElementById('inputArea').style.display='none';
}

// ── HELPERS ──
function scrollToBottom(){
  const area=document.getElementById('messagesArea');
  setTimeout(()=>area.scrollTop=area.scrollHeight,50);
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,80)+'px';
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;border:1px solid rgba(255,255,255,0.1);';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

init();
</script>
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem active"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div class="bl">طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🤝</div><div class="bl">المرشدون</div></a>
</nav>
</body>
</html>
