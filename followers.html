<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — المتابعون</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.5);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;padding-top:var(--nav-h);padding-bottom:calc(var(--bot-h)+40px);}

/* NAV */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-profile-btn{padding:7px 14px;border-radius:20px;background:rgba(255,92,26,0.12);border:1.5px solid rgba(255,92,26,0.25);color:var(--or);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}

/* TABS */
.tabs-wrap{display:flex;margin:16px;background:rgba(255,255,255,0.05);border-radius:16px;padding:4px;gap:4px;}
.tab-btn{flex:1;padding:12px;border-radius:12px;border:none;background:none;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--or);color:white;}
.tab-count{font-size:11px;opacity:0.8;margin-right:4px;}

/* USER CARDS */
.list{padding:0 16px;}
.user-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s;}
.user-card:active{border-color:rgba(255,92,26,0.3);}
.avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--yl));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:white;flex-shrink:0;}
.user-info{flex:1;}
.user-name{font-size:15px;font-weight:800;margin-bottom:3px;}
.user-meta{font-size:12px;color:var(--muted);}
.user-type{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:800;background:rgba(0,201,177,0.1);color:var(--tl);}
.user-type.agent{background:rgba(255,208,0,0.1);color:var(--yl);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-text{font-size:15px;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted);}

/* BOTNAV */
.botnav{position:fixed;bottom:0;width:100%;background:rgba(14,14,14,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;height:var(--bot-h);z-index:1000;}
.bitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;border:none;background:none;font-family:'Tajawal',sans-serif;text-decoration:none;}
.bitem:hover{color:var(--or);}
.bi{font-size:22px;}
</style>
</head>
<body>

<nav class="topnav">
  <div style="display:flex;align-items:center;gap:10px;">
    <button onclick="history.back()" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">→</button>
    <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  </div>
  <button class="nav-profile-btn" id="navProfileBtn" onclick="goToProfile()">ملفي 👤</button>
</nav>

<!-- TABS -->
<div class="tabs-wrap">
  <button class="tab-btn active" id="tabFollowing" onclick="switchTab('following')">
    <span id="countFollowing">٠</span> أتابعهم
  </button>
  <button class="tab-btn" id="tabFollowers" onclick="switchTab('followers')">
    <span id="countFollowers">٠</span> يتابعونني
  </button>
</div>

<!-- LIST -->
<div class="list" id="listWrap">
  <div class="loading">⏳ جاري التحميل...</div>
</div>

<!-- BOTNAV -->
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div>الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">🧳</div><div>الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div>الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🎫</div><div>احجز</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🤝</div><div>المرشدون</div></a>
</nav>

<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');

let currentUser=null;
let followingData=[], followersData=[];
let activeTab='following';

function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}

async function goToProfile(){
  const{data:{session}}=await sb.auth.getSession();
  window.location.href=session?'profile.html':'auth.html';
}

async function initNav(){
  const{data:{session}}=await sb.auth.getSession();
  const btn=document.getElementById('navProfileBtn');
  if(session){
    const{data:p}=await sb.from('profiles').select('full_name').eq('id',session.user.id).maybeSingle();
    btn.textContent=(p?.full_name?.split(' ')[0]||'ملفي')+' 👤';
  }
}

function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabFollowing').classList.toggle('active', tab==='following');
  document.getElementById('tabFollowers').classList.toggle('active', tab==='followers');
  renderList(tab==='following'?followingData:followersData);
}

function renderList(users){
  const wrap=document.getElementById('listWrap');
  if(!users.length){
    wrap.innerHTML=`<div class="empty">
      <div class="empty-icon">${activeTab==='following'?'🔭':'👥'}</div>
      <div class="empty-text">${activeTab==='following'?'لا تتابع أحداً بعد':'لا يوجد متابعون بعد'}</div>
      <div class="empty-sub">${activeTab==='following'?'ابحث عن أعضاء وتابعهم':'شارك رحلاتك لتجذب المتابعين'}</div>
    </div>`;
    return;
  }
  wrap.innerHTML=users.map(u=>{
    const isAgent=u.account_type==='agent';
    const name=u.full_name||u.email?.split('@')[0]||'عضو';
    const initial=name[0].toUpperCase();
    return `
      <div class="user-card" onclick="window.location.href='user.html?id=${u.id}'">
        <div class="avatar">${initial}</div>
        <div class="user-info">
          <div class="user-name">${name}</div>
          <div class="user-meta">${u.country?'📍 '+u.country:''}</div>
        </div>
        <span class="user-type ${isAgent?'agent':''}">${isAgent?'🧭 مرشد':'✈️ مسافر'}</span>
      </div>`;
  }).join('');
}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='auth.html';return;}
  currentUser=session.user;

  // جلب من أتابعهم
  const{data:following}=await sb.from('follows')
    .select('following_id')
    .eq('follower_id',currentUser.id);

  // جلب من يتابعوني
  const{data:followers}=await sb.from('follows')
    .select('follower_id')
    .eq('following_id',currentUser.id);

  const followingIds=(following||[]).map(f=>f.following_id);
  const followerIds=(followers||[]).map(f=>f.follower_id);

  // جلب بيانات الأشخاص
  if(followingIds.length){
    const{data:profiles}=await sb.from('profiles').select('*').in('id',followingIds);
    followingData=profiles||[];
  }
  if(followerIds.length){
    const{data:profiles}=await sb.from('profiles').select('*').in('id',followerIds);
    followersData=profiles||[];
  }

  // تحديث العدد
  document.getElementById('countFollowing').textContent=toAr(followingData.length);
  document.getElementById('countFollowers').textContent=toAr(followersData.length);

  renderList(followingData);
}

initNav();
init();
</script>
</body>
</html>
