<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — وجهات العالم</title>
<meta name="theme-color" content="#FF5C1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;
  --muted:rgba(255,255,255,0.5);--card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;
  padding-top:var(--nav-h);padding-bottom:calc(var(--bot-h)+120px);}

/* NAV */
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);
  padding:0 16px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(14,14,14,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:24px;
  background:linear-gradient(90deg,var(--or),var(--yl));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-profile-btn{padding:8px 16px;border-radius:20px;
  background:rgba(255,92,26,0.12);border:1.5px solid rgba(255,92,26,0.25);
  color:var(--or);font-family:'Tajawal',sans-serif;font-size:13px;
  font-weight:800;cursor:pointer;}

/* HERO */
.hero{padding:24px 16px 16px;text-align:center;}
.hero h1{font-size:28px;font-weight:900;margin-bottom:6px;}
.hero h1 span{background:linear-gradient(90deg,var(--or),var(--yl));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:14px;color:var(--muted);margin-bottom:20px;}

/* SEARCH */
.search-wrap{padding:0 16px 12px;}
.search-box{display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.07);border:1.5px solid var(--border);
  border-radius:16px;padding:12px 16px;transition:border-color .2s;}
.search-box:focus-within{border-color:var(--or);}
.search-box input{flex:1;background:none;border:none;outline:none;
  color:white;font-family:'Tajawal',sans-serif;font-size:15px;direction:rtl;}
.search-box input::placeholder{color:var(--muted);}

/* FILTERS */
.filters{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fchip{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);
  background:none;color:rgba(255,255,255,0.6);font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;}
.fchip.active{background:var(--or);border-color:var(--or);color:white;}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px;}

/* DESTINATION CARD */
.dest-card{border-radius:20px;overflow:hidden;background:#1a1a1a;
  border:1px solid var(--border);cursor:pointer;transition:transform .2s;
  position:relative;}
.dest-card:active{transform:scale(0.97);}

/* IMAGE SLIDER */
.img-slider{position:relative;height:140px;overflow:hidden;}
.img-slider img{width:100%;height:100%;object-fit:cover;
  position:absolute;top:0;left:0;opacity:0;transition:opacity .4s;}
.img-slider img.active{opacity:1;}
.slider-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;z-index:2;}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.4);
  transition:background .3s;}
.sdot.active{background:white;}
.img-overlay{position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(transparent,rgba(0,0,0,0.8));z-index:1;}

/* BADGES ON IMAGE */
.img-badges{position:absolute;top:8px;right:8px;display:flex;gap:4px;z-index:2;}
.ibadge{padding:3px 8px;border-radius:8px;font-size:9px;font-weight:800;
  backdrop-filter:blur(8px);background:rgba(0,0,0,0.5);}
.ibadge.novisa{background:rgba(0,201,177,0.8);color:white;}
.ibadge.summer{background:rgba(255,208,0,0.8);color:#000;}
.ibadge.family{background:rgba(255,92,26,0.8);color:white;}

/* CARD BODY */
.card-body{padding:10px 12px 12px;}
.card-name{font-size:15px;font-weight:900;margin-bottom:2px;}
.card-country{font-size:11px;color:var(--muted);margin-bottom:8px;}
.card-stats{display:flex;justify-content:space-between;align-items:center;}
.card-rating{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--yl);}
.card-cost{font-size:10px;color:var(--muted);}
.card-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.ctag{padding:2px 7px;border-radius:6px;font-size:9px;font-weight:800;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}

/* DETAIL SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;max-height:92vh;
  background:#111;border-radius:24px 24px 0 0;z-index:2001;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
  overflow:hidden;display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}

/* SHEET IMAGES */
.sheet-imgs{position:relative;height:280px;overflow:hidden;flex-shrink:0;}
.sheet-imgs img{width:100%;height:100%;object-fit:cover;
  position:absolute;top:0;left:0;opacity:0;transition:opacity .4s;}
.sheet-imgs img.active{opacity:1;}
.sheet-img-nav{position:absolute;top:50%;transform:translateY(-50%);
  width:100%;display:flex;justify-content:space-between;padding:0 12px;z-index:2;}
.snav-btn{width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:none;color:white;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);}
.sheet-img-dots{position:absolute;bottom:10px;left:50%;
  transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
.sheet-img-overlay{position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));}
.sheet-title-over{position:absolute;bottom:14px;right:16px;z-index:3;}
.sheet-city{font-size:24px;font-weight:900;}
.sheet-ctry{font-size:13px;color:rgba(255,255,255,0.7);}

/* SHEET SCROLL */
.sheet-scroll{overflow-y:auto;flex:1;padding-bottom:20px;}

/* QUICK STATS */
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:10px 16px;}
.qstat{background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:14px;padding:10px;text-align:center;}
.qstat-icon{font-size:18px;margin-bottom:3px;}
.qstat-val{font-size:12px;font-weight:800;color:white;}
.qstat-lbl{font-size:9px;color:var(--muted);margin-top:1px;}

/* TABS */
.tabs{display:flex;margin:0 16px 10px;background:rgba(255,255,255,0.05);
  border-radius:14px;padding:3px;gap:2px;}
.tab{flex:1;padding:9px 4px;border-radius:11px;border:none;
  background:none;color:var(--muted);font-family:'Tajawal',sans-serif;
  font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--or);color:white;}

/* TAB PANELS */
.tab-panel{display:none;padding:0 16px;}
.tab-panel.active{display:block;}

/* INFO SECTION */
.info-sec{margin-bottom:16px;}
.info-sec-title{font-size:12px;font-weight:800;color:var(--or);
  margin-bottom:8px;letter-spacing:.5px;}
.info-row{display:flex;align-items:flex-start;gap:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:12px;padding:10px 12px;margin-bottom:6px;}
.info-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.info-content{}
.info-label{font-size:10px;color:var(--muted);margin-bottom:1px;}
.info-value{font-size:13px;font-weight:700;}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.tag{padding:6px 12px;border-radius:10px;font-size:12px;font-weight:700;}
.tag-green{background:rgba(0,201,177,0.1);color:var(--tl);border:1px solid rgba(0,201,177,0.2);}
.tag-or{background:rgba(255,92,26,0.1);color:var(--or);border:1px solid rgba(255,92,26,0.2);}
.tag-yl{background:rgba(255,208,0,0.1);color:var(--yl);border:1px solid rgba(255,208,0,0.2);}
.tag-red{background:rgba(229,57,53,0.1);color:#ff6b6b;border:1px solid rgba(229,57,53,0.2);}

/* SUITABILITY */
.suit-wrap{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.suit-item{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:12px;padding:10px;}
.suit-icon{font-size:20px;}
.suit-info{}
.suit-name{font-size:12px;font-weight:800;}
.suit-val{font-size:10px;color:var(--muted);}

/* REVIEWS */
.review-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:10px;}
.review-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.review-avatar{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--or),var(--yl));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;flex-shrink:0;}
.review-name{font-size:13px;font-weight:800;}
.review-date{font-size:10px;color:var(--muted);}
.review-stars{color:var(--yl);font-size:13px;}
.review-text{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.8);}
.add-review-btn{width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--or),#ff8c42);
  color:white;font-family:'Tajawal',sans-serif;font-size:14px;
  font-weight:800;border:none;cursor:pointer;margin-bottom:12px;}
.no-reviews{text-align:center;padding:30px;color:var(--muted);font-size:14px;}

/* REVIEW MODAL */
.rmodal{position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:3000;display:none;align-items:flex-end;}
.rmodal.open{display:flex;}
.rmodal-box{background:#1a1a1a;border-radius:24px 24px 0 0;
  padding:24px;width:100%;}
.rmodal-title{font-size:17px;font-weight:900;margin-bottom:16px;}
.star-select{display:flex;gap:8px;margin-bottom:14px;justify-content:center;}
.star-btn{font-size:28px;cursor:pointer;opacity:0.3;transition:opacity .2s;}
.star-btn.active{opacity:1;}
.rmodal textarea{width:100%;background:rgba(255,255,255,0.06);
  border:1.5px solid var(--border);border-radius:14px;padding:12px;
  font-family:'Tajawal',sans-serif;font-size:14px;color:white;
  outline:none;resize:none;height:100px;direction:rtl;}
.rmodal textarea:focus{border-color:var(--or);}
.rmodal-btns{display:flex;gap:10px;margin-top:14px;}
.rmodal-cancel{flex:1;padding:13px;border-radius:14px;
  background:rgba(255,255,255,0.08);border:none;color:white;
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.rmodal-submit{flex:2;padding:13px;border-radius:14px;
  background:linear-gradient(135deg,var(--or),#ff8c42);border:none;
  color:white;font-family:'Tajawal',sans-serif;font-size:14px;
  font-weight:800;cursor:pointer;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:52px;margin-bottom:12px;}

/* BOTNAV */
.botnav{position:fixed;bottom:0;width:100%;
  background:rgba(14,14,14,0.97);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);display:flex;height:var(--bot-h);z-index:1000;}
.bitem{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;color:var(--muted);
  font-size:10px;font-weight:700;border:none;background:none;
  font-family:'Tajawal',sans-serif;text-decoration:none;}
.bitem.active,.bitem:hover{color:var(--or);}
.bi{font-size:22px;}

/* CLOSE SHEET BTN */
.sheet-close{position:absolute;top:12px;left:12px;width:32px;height:32px;
  border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:white;
  font-size:18px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;z-index:4;backdrop-filter:blur(8px);}
</style>
</head>

let allDests = [], filtered = [], activeFilter = 'all';
let currentDest = null, currentUser = null;
let selectedStar = 0, sheetImgIdx = 0;

// توليد روابط صور Unsplash لكل وجهة
// Wikipedia page names for each city
const WIKI_PAGES = {
  'إسطنبول': 'Istanbul',
  'كوالالمبور': 'Kuala_Lumpur',
  'تبليسي': 'Tbilisi',
  'باكو': 'Baku',

};

function getDestImages(dest) {
  if(dest.images && dest.images.length > 0) return dest.images;
  // Fallback gradient placeholder
  return [];
}

// جلب صور Wikipedia لوجهة معينة
async function loadWikiImages(dest, imgContainer) {
  const cityKey = Object.keys(WIKI_PAGES).find(k => dest.name && dest.name.includes(k));
  const wikiPage = cityKey ? WIKI_PAGES[cityKey] : (dest.name || 'Travel');
  
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${wikiPage}&prop=pageimages|images&format=json&pithumbsize=800&pilimit=4&origin=*`;
    const resp = await fetch(url);
    const data = await resp.json();
    const pages = data.query?.pages;
    const page = pages ? Object.values(pages)[0] : null;
    
    if(page?.thumbnail?.source) {
      const mainImg = page.thumbnail.source.replace(/\/\d+px-/, '/800px-');
      // Update first image
      const imgs = imgContainer.querySelectorAll('img');
      if(imgs[0]) {
        imgs[0].src = mainImg;
        imgs[0].classList.add('active');
      }
    }
  } catch(e) {
    console.log('Wiki image load failed:', e);
  }
}

// ═══ INIT NAV ═══
async function goToProfile() {
  const{data:{session}} = await sb.auth.getSession();
  window.location.href = session ? 'profile.html' : 'auth.html';
}

async function initNav() {
  const{data:{session}} = await sb.auth.getSession();
  currentUser = session?.user || null;
  const btn = document.getElementById('navProfileBtn');
  if(currentUser) {
    const{data:p} = await sb.from('profiles').select('full_name').eq('id',currentUser.id).maybeSingle();
    btn.textContent = (p?.full_name?.split(' ')[0] || 'ملفي') + ' 👤';
  }
}

// ═══ LOAD DESTINATIONS ═══
async function loadDests() {
  const{data} = await sb.from('destinations').select('*').order('name');
  allDests = data || [];
  filtered = allDests;
  renderGrid(filtered);
}

// ═══ FILTER ═══
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function filterDests() {
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInp').value.toLowerCase().trim();
  filtered = allDests.filter(d => {
    const txt = (d.name||'') + (d.country||'') + (d.description||'') +
      (d.must_visit||[]).join(' ') + (d.must_eat||[]).join(' ');
    const matchQ = !q || txt.toLowerCase().includes(q);
    let matchF = activeFilter === 'all';
    if(!matchF) {
      const t = txt.toLowerCase();
      if(activeFilter==='summer') matchF = /صيف|يونيو|يوليو|أغسطس|مايو|أبريل|ربيع/.test(t);
      else if(activeFilter==='novisa') matchF = /بدون تأشيرة|بلا تأشيرة|مجاناً/.test(d.visa_info||'');
      else if(activeFilter==='family') matchF = /عائلي|عائلة|أطفال|all inclusive|منتجع/.test(t);
      else if(activeFilter==='beach') matchF = /شاطئ|بحر|ساحل|جزيرة/.test(t);
      else if(activeFilter==='culture') matchF = /متحف|تاريخ|قصر|قلعة|تراث|معبد/.test(t);
      else if(activeFilter==='adventure') matchF = /جبل|سفاري|غطس|مغامرة|شلال|بركان/.test(t);
      else if(activeFilter==='food') matchF = (d.must_eat||[]).length >= 4;
    }
    return matchQ && matchF;
  });
  renderGrid(filtered);
}

// ═══ RENDER GRID ═══
function renderGrid(dests) {
  const grid = document.getElementById('destsGrid');
  if(!dests.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>لا توجد نتائج</div></div>';
    return;
  }
  grid.innerHTML = dests.map((d,i) => {
    const imgs = getDestImages(d);
    const stars = d.rating_avg ? '⭐'.repeat(Math.round(d.rating_avg)) : '';
    const noVisa = /بدون تأشيرة|بلا تأشيرة/.test(d.visa_info||'');
    const isSummer = /صيف|يونيو|يوليو|أغسطس|مايو|أبريل/.test(d.best_time||'');
    const isFamily = /عائلي|عائلة/.test((d.description||'')+(d.must_visit||[]).join(''));
    return `
      <div class="dest-card" onclick="openDest(${i})">
        <div class="img-slider" id="slider-${i}">
          ${imgs.length > 0 
            ? imgs.map((url,j) => `<img src="${url}" alt="${d.name}" class="${j===0?'active':''}" onerror="this.style.background='#1a1a1a'">`).join('')
            : `<img src="" alt="${d.name}" class="active" style="background:linear-gradient(135deg,#FF5C1A22,#FFD00022)" onerror="this.style.background='#1a1a1a'">`
          }
          <div class="img-overlay"></div>
          <div class="img-badges">
            ${noVisa ? '<span class="ibadge novisa">بلا تأشيرة</span>' : ''}
            ${isSummer ? '<span class="ibadge summer">☀️ صيف</span>' : ''}
            ${isFamily ? '<span class="ibadge family">👨‍👩‍👧</span>' : ''}
          </div>
          <div class="slider-dots">
            ${imgs.map((_,j) => `<div class="sdot ${j===0?'active':''}"></div>`).join('')}
          </div>
        </div>
        <div class="card-body">
          <div class="card-name">${d.emoji||'🌍'} ${d.name}</div>
          <div class="card-country">${d.country}</div>
          <div class="card-stats">
            <div class="card-rating">${stars||'☆☆☆☆☆'} <span style="color:var(--muted)">(${d.reviews_count||0})</span></div>
            <div class="card-cost">${d.daily_cost?.split(' ')[0]||'—'}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  // Load Wikipedia images and auto-slide
  dests.forEach((d, i) => {
    const imgs = getDestImages(d);
    autoSlide(i, Math.max(imgs.length, 1));
    // Load wiki image if no DB images
    if(!d.images || d.images.length === 0) {
      const container = document.getElementById('slider-'+i);
      if(container) loadWikiImages(d, container);
    }
  });
}

// ═══ AUTO SLIDE ═══
function autoSlide(idx, total) {
  if(total <= 1) return;
  let current = 0;
  setInterval(() => {
    const slider = document.getElementById('slider-'+idx);
    if(!slider) return;
    const imgs = slider.querySelectorAll('img');
    const dots = slider.querySelectorAll('.sdot');
    imgs[current].classList.remove('active');
    dots[current]?.classList.remove('active');
    current = (current + 1) % total;
    imgs[current].classList.add('active');
    dots[current]?.classList.add('active');
  }, 3000 + idx * 500);
}

  const imgs = getDestImages(d);
  const sheetImgs = document.getElementById('sheetImgs');
  sheetImgs.innerHTML = `
    ${imgs.map((url,j) => `<img src="${url}" alt="${d.name}" class="${j===0?'active':''}"
      onerror="this.style.background='#1a1a1a'">`).join('')}
    <div class="sheet-img-overlay"></div>
    <div class="sheet-title-over">
      <div class="sheet-city">${d.emoji||'🌍'} ${d.name}</div>
      <div class="sheet-ctry">${d.country}</div>
    </div>
    <div class="sheet-img-nav">
      <button class="snav-btn" onclick="slideSheet(-1)">‹</button>

      ${imgs.map((_,j) => `<div class="sdot ${j===0?'active':''}" style="width:6px;height:6px"></div>`).join('')}

  // Quick stats
  document.getElementById('sheetQstats').innerHTML = `
    <div class="qstat"><div class="qstat-icon">🛫</div>
      <div class="qstat-val">${d.flight_time?.split(' ')[0]||'—'}</div>
      <div class="qstat-lbl">ساعات طيران</div></div>
    <div class="qstat"><div class="qstat-icon">💰</div>
      <div class="qstat-val">${d.daily_cost?.split('-')[0]||'—'}</div>
      <div class="qstat-lbl">يومياً (د.ك)</div></div>
    <div class="qstat"><div class="qstat-icon">🌡️</div>
      <div class="qstat-val">${d.best_time?.split('-')[0]?.trim()||'—'}</div>
      <div class="qstat-lbl">أفضل شهر</div></div>`;

  renderGeneralTab(d);
  renderFoodTab(d);
  renderTipsTab(d);
  await renderReviewsTab(d);

  // Reset tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab').classList.add('active');
  document.getElementById('panel-general').classList.add('active');

  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
  const aiBtn = document.getElementById('rihlaAiBtn');
  if(aiBtn) aiBtn.style.display = 'none';
  const aiWin = document.getElementById('rihlaAiWin');
  if(aiWin) aiWin.style.display = 'none';
}

function slideSheet(dir) {
  const d = currentDest;
  const imgs = getDestImages(d);
  const total = imgs.length;
  const container = document.getElementById('sheetImgs');
  const imgEls = container.querySelectorAll('img');
  const dots = container.querySelectorAll('.sdot');
  imgEls[sheetImgIdx].classList.remove('active');
  dots[sheetImgIdx]?.classList.remove('active');
  sheetImgIdx = (sheetImgIdx + dir + total) % total;
  imgEls[sheetImgIdx].classList.add('active');
  dots[sheetImgIdx]?.classList.add('active');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
  currentDest = null;
  const aiBtn = document.getElementById('rihlaAiBtn');
  if(aiBtn) aiBtn.style.display = 'flex';
}

// ═══ REVIEWS TAB ═══
async function renderReviewsTab(d) {
  const panel = document.getElementById('panel-reviews');
  panel.innerHTML = '<div class="no-reviews">⏳ جاري التحميل...</div>';

  const{data:reviews} = await sb.from('destination_reviews')
    .select('*, profiles(full_name)')
    .eq('destination_id', d.id)
    .order('created_at', {ascending: false})
    .limit(20);

  const addBtn = currentUser
    ? `<button class="add-review-btn" onclick="openReviewModal()">✍️ أضف تقييمك</button>`
    : `<button class="add-review-btn" onclick="window.location.href='auth.html'">سجّل دخولك لإضافة تقييم 👤</button>`;

  if(!reviews?.length) {
    panel.innerHTML = `
      ${addBtn}
      <div class="no-reviews">😊 كن أول من يقيّم هذه الوجهة!</div>`;
    return;
  }

  panel.innerHTML = addBtn + reviews.map(r => {
    const name = r.profiles?.full_name || 'عضو';
    const initial = name[0].toUpperCase();
    const stars = '⭐'.repeat(r.rating||0);
    const date = new Date(r.created_at).toLocaleDateString('ar-KW');
    return `
      <div class="review-card">
        <div class="review-head">
          <div class="review-avatar">${initial}</div>
          <div style="flex:1">
            <div class="review-name">${name}</div>
            <div class="review-date">${date}</div>
          </div>
          <div class="review-stars">${stars}</div>
        </div>
        ${r.comment ? `<div class="review-text">${r.comment}</div>` : ''}
      </div>`;
  }).join('');
}

// ═══ REVIEW MODAL ═══
function openReviewModal() {
  if(!currentUser) { window.location.href='auth.html'; return; }
  selectedStar = 0;
  document.querySelectorAll('.star-btn').forEach(s => s.classList.remove('active'));
  document.getElementById('reviewText').value = '';
  document.getElementById('reviewModal').classList.add('open');
}

function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('open');
}

function setStar(n) {
  selectedStar = n;
  document.querySelectorAll('.star-btn').forEach((s,i) => {
    s.classList.toggle('active', i < n);
  });
}

async function submitReview() {
  if(!selectedStar) { alert('اختر تقييماً بالنجوم'); return; }
  const comment = document.getElementById('reviewText').value.trim();
  await sb.from('destination_reviews').upsert({
    destination_id: currentDest.id,
    user_id: currentUser.id,
    rating: selectedStar,
    comment: comment || null
  }, {onConflict: 'destination_id,user_id'});
  closeReviewModal();
  await renderReviewsTab(currentDest);
}

  msgs.scrollTop=msgs.scrollHeight;btn.disabled=false;
};
