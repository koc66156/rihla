<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — المفضلة</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-top:var(--nav-h);padding-bottom:calc(var(--bot-h)+48px);}

.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-back{color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;background:none;border:none;cursor:pointer;}

.page-header{padding:20px 16px 0;}
.page-title{font-size:24px;font-weight:900;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}

/* TABS */
.tabs{display:flex;margin:0 16px 20px;background:rgba(255,255,255,0.04);border-radius:14px;padding:3px;}
.tab{flex:1;padding:10px;border-radius:12px;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .2s;}
.tab.active{background:var(--or);color:white;}

/* POSTS */
.posts-wrap{padding:0 16px;}
.bk-post{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:14px;cursor:pointer;transition:all .2s;display:flex;gap:0;}
.bk-post:hover{border-color:var(--or);}
.bk-post-img{width:90px;height:90px;object-fit:cover;flex-shrink:0;}
.bk-post-no-img{width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,rgba(255,92,26,0.1),rgba(255,208,0,0.06));flex-shrink:0;}
.bk-post-info{flex:1;padding:12px;}
.bk-post-dest{font-size:10px;color:var(--or);font-weight:700;margin-bottom:3px;}
.bk-post-title{font-size:13px;font-weight:800;margin-bottom:3px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.bk-post-meta{font-size:11px;color:var(--muted);}
.bk-remove{padding:6px;background:none;border:none;color:rgba(255,255,255,0.3);font-size:16px;cursor:pointer;flex-shrink:0;align-self:center;margin-left:8px;}

/* TRIPS */
.trips-wrap{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.bk-trip{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:10px;align-items:center;cursor:pointer;transition:all .2s;}
.bk-trip:hover{border-color:var(--or);}
.bk-trip-em{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.bk-trip-info{flex:1;}
.bk-trip-name{font-size:14px;font-weight:800;margin-bottom:3px;}
.bk-trip-meta{font-size:11px;color:var(--muted);}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;}
.empty .ei{font-size:52px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7;}
.empty button{padding:12px 28px;border-radius:20px;background:var(--or);color:white;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}

.toast{position:fixed;bottom:calc(var(--bot-h)+14px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:11px 20px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border:1px solid rgba(255,255,255,0.08);pointer-events:none;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-back" onclick="window.history.back()">→ رجوع</button>
</nav>

<div class="page-header">
  <div class="page-title">🔖 المفضلة</div>
  <div class="page-sub">المنشورات والرحلات التي حفظتها</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('posts',this)">📸 المنشورات</button>
  <button class="tab" onclick="setTab('trips',this)">✈️ الرحلات</button>
</div>

<div id="postsWrap" class="posts-wrap"></div>
<div id="tripsWrap" class="trips-wrap" style="display:none"></div>

<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div class="bl">طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🧭</div><div class="bl">المرشدون</div></a>
</nav>

<div class="toast" id="toast"></div>

<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');

let currentUser=null, currentTab='posts';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='auth.html';return;}
  currentUser=session.user;
  await loadPosts();
  await loadTrips();
}

async function loadPosts(){
  const{data:bks}=await sb.from('bookmarks').select('item_id').eq('user_id',currentUser.id).eq('item_type','post').order('created_at',{ascending:false});
  const wrap=document.getElementById('postsWrap');
  if(!bks||bks.length===0){
    wrap.innerHTML=`<div class="empty"><div class="ei">📌</div><h3>لا توجد منشورات محفوظة</h3><p>اضغط على 📌 في أي منشور لحفظه</p><button onclick="window.location.href='index.html'">تصفح المنشورات</button></div>`;
    return;
  }
  const ids=bks.map(b=>b.item_id);
  const{data:posts}=await sb.from('posts').select('*').in('id',ids);
  if(!posts||posts.length===0){wrap.innerHTML='<div class="empty"><div class="ei">📌</div><h3>لا توجد منشورات</h3></div>';return;}
  wrap.innerHTML=posts.map(p=>{
    const img=p.images?.[0];
    const dt=new Date(p.created_at).toLocaleDateString('ar-KW',{day:'numeric',month:'short'});
    return`<div class="bk-post" onclick="window.location.href='post.html?id=${p.id}'">
      ${img?`<img class="bk-post-img" src="${img}" loading="lazy">`:`<div class="bk-post-no-img">🌍</div>`}
      <div class="bk-post-info">
        ${p.destination?`<div class="bk-post-dest">📍 ${p.destination}</div>`:''}
        <div class="bk-post-title">${p.title}</div>
        <div class="bk-post-meta">🤍 ${p.likes||0} · ${dt}</div>
      </div>
      <button class="bk-remove" onclick="event.stopPropagation();removeBookmark('${p.id}','post','post-${p.id}')">✕</button>
    </div>`;
  }).join('');
}

async function loadTrips(){
  const{data:bks}=await sb.from('bookmarks').select('item_id').eq('user_id',currentUser.id).eq('item_type','trip').order('created_at',{ascending:false});
  const wrap=document.getElementById('tripsWrap');
  if(!bks||bks.length===0){
    wrap.innerHTML=`<div class="empty"><div class="ei">📌</div><h3>لا توجد رحلات محفوظة</h3><p>اضغط على 📌 في أي رحلة لحفظها</p><button onclick="window.location.href='trips.html'">تصفح الرحلات</button></div>`;
    return;
  }
  const ids=bks.map(b=>b.item_id);
  const{data:trips}=await sb.from('trips').select('*').in('id',ids);
  if(!trips||trips.length===0){wrap.innerHTML='<div class="empty"><div class="ei">✈️</div><h3>لا توجد رحلات</h3></div>';return;}
  wrap.innerHTML=trips.map(t=>{
    const dt=new Date(t.date).toLocaleDateString('ar-KW',{day:'numeric',month:'long'});
    const left=(t.seats||5)-(t.seats_taken||0);
    return`<div class="bk-trip" onclick="window.location.href='trip.html?id=${t.id}'">
      <div class="bk-trip-em">${t.emoji||'✈️'}</div>
      <div class="bk-trip-info">
        <div class="bk-trip-name">${t.title}</div>
        <div class="bk-trip-meta">📅 ${dt} · ${t.country} · ${toAr(left)} أماكن</div>
      </div>
      <button class="bk-remove" onclick="event.stopPropagation();removeBookmark('${t.id}','trip','trip-${t.id}')">✕</button>
    </div>`;
  }).join('');
}

async function removeBookmark(itemId,type,elId){
  await sb.from('bookmarks').delete().eq('user_id',currentUser.id).eq('item_id',itemId).eq('item_type',type);
  showToast('تم الحذف من المفضلة');
  if(type==='post') await loadPosts();
  else await loadTrips();
}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('postsWrap').style.display=tab==='posts'?'block':'none';
  document.getElementById('tripsWrap').style.display=tab==='trips'?'flex':'none';
}

function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
init();
</script>
</body>
</html>
