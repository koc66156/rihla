<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تصنيف الأماكن — رِحلة Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#0E0E0E;color:white;padding:20px;}
h1{font-size:20px;margin-bottom:20px;color:#FF5C1A;}
.dest-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dest-name{font-size:14px;font-weight:800;}
.dest-country{font-size:12px;color:rgba(255,255,255,0.5);}
.status{font-size:12px;padding:4px 10px;border-radius:8px;}
.status.done{background:rgba(0,201,177,0.2);color:#00C9B1;}
.status.pending{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);}
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;}
.btn-or{background:#FF5C1A;color:white;}
.btn-all{background:rgba(255,92,26,0.2);color:#FF5C1A;border:1px solid rgba(255,92,26,0.3);margin-bottom:16px;padding:12px 24px;font-size:14px;}
.log{background:rgba(0,0,0,0.3);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:rgba(255,255,255,0.7);max-height:150px;overflow-y:auto;font-family:monospace;}
</style>
</head>
<body>
<h1>🗂️ تصنيف أماكن الوجهات</h1>
<div class="log" id="log">جاهز...</div>
<button class="btn btn-all" onclick="classifyAll()">⚡ صنّف كل الوجهات دفعة واحدة</button>
<div id="destList"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://ybjdagurvkweabujkeyz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI'
);

let dests = [];

function log(msg){ 
  const el=document.getElementById('log');
  el.innerHTML+=msg+'<br>';
  el.scrollTop=el.scrollHeight;
}

async function init(){
  const{data}=await sb.from('destinations')
    .select('id,name,country,must_visit,places_classified')
    .order('country');
  dests=data||[];
  render();
}

function render(){
  const list=document.getElementById('destList');
  list.innerHTML=dests.map((d,i)=>`
    <div class="dest-item">
      <div>
        <div class="dest-name">${d.name}</div>
        <div class="dest-country">${d.country}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="status ${d.places_classified?'done':'pending'}">
          ${d.places_classified?'✅ مصنّف':'⏳ لم يصنّف'}
        </span>
        <button class="btn btn-or" onclick="classifyOne(${i})">صنّف</button>
      </div>
    </div>`).join('');
}

async function classifyOne(idx){
  const d=dests[idx];
  if(!d.must_visit||!d.must_visit.length){
    log(`⚠️ ${d.name}: لا توجد أماكن`);
    return;
  }
  log(`⏳ ${d.name}...`);

  const prompt=`صنّف هذه الأماكن في ${d.name} بتنسيق JSON فقط بدون أي نص:
الأماكن: ${d.must_visit.join('، ')}

التنسيق المطلوب (JSON array فقط):
[{"name":"اسم المكان","category":"ثقافة او تسوق او طبيعة او شاطئ او ترفيه او طعام","time":"صباحاً او ظهراً او مساءً","for":["عائلي","شباب","زوجين","منفرد"]}]

التصنيفات المتاحة للـ category: ثقافة، تسوق، طبيعة، شاطئ، ترفيه، طعام
الـ for يحتوي على واحد أو أكثر من: عائلي، شباب، زوجين، منفرد`;

  try{
    const r=await fetch('https://ybjdagurvkweabujkeyz.supabase.co/functions/v1/ai-chat',{
      method:'POST',
      headers:{'Content-Type':'application/json',
        'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI',
        'Authorization':'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI'},
      body:JSON.stringify({message:prompt,context:'أجب بـ JSON array فقط بدون أي نص إضافي.',history:[]})
    });
    const resp=await r.json();
    const ans=resp.answer||'';
    
    // استخراج JSON من الرد
    const match=ans.match(/\[[\s\S]*\]/);
    if(!match){log(`❌ ${d.name}: رد غير صحيح`);return;}
    
    const places=JSON.parse(match[0]);
    
    // تخزين في DB
    await sb.from('destinations')
      .update({places_classified:places})
      .eq('id',d.id);
    
    dests[idx].places_classified=places;
    log(`✅ ${d.name}: ${places.length} مكان`);
    render();
    
    // انتظر ثانيتين بين الطلبات
    await new Promise(r=>setTimeout(r,2000));
    
  }catch(e){
    log(`❌ ${d.name}: ${e.message}`);
  }
}

async function classifyAll(){
  log('🚀 بدء تصنيف كل الوجهات...');
  for(let i=0;i<dests.length;i++){
    if(!dests[i].places_classified){
      await classifyOne(i);
    } else {
      log(`⏭️ ${dests[i].name}: مصنّف مسبقاً`);
    }
  }
  log('🎉 اكتمل التصنيف!');
}

init();
</script>
</body>
</html>
