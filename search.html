<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — البحث المتقدم</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-top:var(--nav-h);padding-bottom:calc(var(--bot-h)+120px);}

.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-back{color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;background:none;border:none;cursor:pointer;}

/* SEARCH HEADER */
.search-header{padding:20px 16px 0;}
.search-title{font-size:24px;font-weight:900;margin-bottom:4px;}
.search-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}

/* MAIN SEARCH */
.main-search{display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid rgba(255,92,26,0.3);border-radius:16px;padding:13px 16px;margin:0 16px 20px;}
.main-search input{flex:1;background:transparent;border:none;font-family:'Tajawal',sans-serif;font-size:15px;color:white;outline:none;}
.main-search input::placeholder{color:rgba(255,255,255,0.2);}
.search-go{padding:8px 18px;border-radius:12px;background:var(--or);color:white;border:none;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}

/* FILTERS */
.filters-section{padding:0 16px;margin-bottom:20px;}
.filter-group{margin-bottom:16px;}
.fg-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
.fg-chips{display:flex;gap:7px;flex-wrap:wrap;}
.fchip{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.6);transition:all .2s;}
.fchip.active{background:var(--or);color:white;border-color:var(--or);}

/* DATE RANGE */
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.date-field{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:11px 14px;display:flex;align-items:center;gap:8px;}
.date-field input{flex:1;background:transparent;border:none;font-family:'Tajawal',sans-serif;font-size:12px;color:white;outline:none;min-width:0;}
.date-field label{font-size:10px;font-weight:800;color:var(--muted);white-space:nowrap;}

/* SEATS SLIDER */
.seats-row{display:flex;align-items:center;gap:12px;}
.seats-val{font-size:18px;font-weight:900;color:var(--or);min-width:30px;text-align:center;}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:rgba(255,92,26,0.3);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--or);cursor:pointer;}

/* RESET */
.reset-btn{width:100%;padding:12px;border-radius:13px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:rgba(255,255,255,0.5);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 16px;}

/* RESULTS */
.results-header{padding:0 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.results-count{font-size:13px;color:var(--muted);}
.results-count strong{color:white;}
.sort-btn{padding:6px 12px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:rgba(255,255,255,0.6);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}

/* TRIP CARDS */
.results-grid{display:flex;flex-direction:column;gap:12px;padding:0 16px;}
.tcard{background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all .25s;display:flex;gap:0;}
.tcard:hover{border-color:var(--or);}
.tc-img{width:100px;min-height:110px;display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0;}
.tc-body{flex:1;padding:14px 14px 14px 8px;}
.tc-title{font-size:14px;font-weight:900;margin-bottom:5px;line-height:1.3;}
.tc-dest{font-size:11px;color:var(--or);font-weight:700;margin-bottom:6px;}
.tc-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.tc-meta span{font-size:11px;color:var(--muted);}
.tc-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tc-tag{padding:3px 8px;border-radius:8px;background:rgba(0,201,177,0.1);color:var(--tl);font-size:10px;font-weight:700;}
.tc-seats{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:800;margin-top:6px;}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;}
.empty .ei{font-size:52px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--muted);}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}
.bitem.active .bl,.bitem.active .bi{color:var(--or);}
</style>
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-back" onclick="window.history.back()">→ رجوع</button>
</nav>

<div class="search-header">
  <div class="search-title">🔍 البحث المتقدم</div>
  <div class="search-sub">ابحث عن رحلتك المثالية بدقة</div>
</div>

<!-- MAIN SEARCH -->
<div class="main-search">
  <span>🔍</span>
  <input type="text" id="mainSearch" placeholder="ابحث بالوجهة أو اسم الرحلة..." oninput="applyFilters()">
  <button class="search-go" onclick="applyFilters()">بحث</button>
</div>

<!-- FILTERS -->
<div class="filters-section">

  <!-- DESTINATION TYPE -->
  <div class="filter-group">
    <div class="fg-title">🌍 نوع الوجهة</div>
    <div class="fg-chips" id="destChips">
      <button class="fchip active" onclick="setFilter('dest','الكل',this)">الكل</button>
      <button class="fchip" onclick="setFilter('dest','تركيا',this)">🇹🇷 تركيا</button>
      <button class="fchip" onclick="setFilter('dest','اليابان',this)">🇯🇵 اليابان</button>
      <button class="fchip" onclick="setFilter('dest','أوروبا',this)">🇪🇺 أوروبا</button>
      <button class="fchip" onclick="setFilter('dest','آسيا',this)">🌏 آسيا</button>
      <button class="fchip" onclick="setFilter('dest','الخليج',this)">🌴 الخليج</button>
    </div>
  </div>

  <!-- TAGS -->
  <div class="filter-group">
    <div class="fg-title">🏷️ نوع الرحلة</div>
    <div class="fg-chips" id="tagChips">
      <button class="fchip active" onclick="setFilter('tag','الكل',this)">الكل</button>
      <button class="fchip" onclick="setFilter('tag','مغامرة',this)">🔥 مغامرة</button>
      <button class="fchip" onclick="setFilter('tag','عائلي',this)">👨‍👩‍👧 عائلي</button>
      <button class="fchip" onclick="setFilter('tag','شاطئ',this)">🌊 شاطئ</button>
      <button class="fchip" onclick="setFilter('tag','ثقافة',this)">🏛️ ثقافة</button>
      <button class="fchip" onclick="setFilter('tag','طعام',this)">🍜 طعام</button>
      <button class="fchip" onclick="setFilter('tag','طبيعة',this)">🌿 طبيعة</button>
    </div>
  </div>

  <!-- DATE RANGE -->
  <div class="filter-group">
    <div class="fg-title">📅 تاريخ السفر</div>
    <div class="date-row">
      <div class="date-field">
        <label>من</label>
        <input type="date" id="dateFrom" onchange="applyFilters()">
      </div>
      <div class="date-field">
        <label>إلى</label>
        <input type="date" id="dateTo" onchange="applyFilters()">
      </div>
    </div>
  </div>

  <!-- SEATS -->
  <div class="filter-group">
    <div class="fg-title">👥 الحد الأدنى من الأماكن المتاحة</div>
    <div class="seats-row">
      <span>١</span>
      <input type="range" id="seatsRange" min="1" max="10" value="1" oninput="updateSeats(this.value)">
      <span class="seats-val" id="seatsVal">١+</span>
    </div>
  </div>

  <!-- DURATION -->
  <div class="filter-group">
    <div class="fg-title">⏱️ مدة الرحلة</div>
    <div class="fg-chips" id="durChips">
      <button class="fchip active" onclick="setFilter('dur','الكل',this)">الكل</button>
      <button class="fchip" onclick="setFilter('dur','يوم واحد',this)">يوم</button>
      <button class="fchip" onclick="setFilter('dur','أسبوع',this)">أسبوع</button>
      <button class="fchip" onclick="setFilter('dur','أسبوعان',this)">أسبوعان</button>
      <button class="fchip" onclick="setFilter('dur','شهر',this)">شهر+</button>
    </div>
  </div>

  <button class="reset-btn" onclick="resetFilters()">↺ إعادة تعيين الفلاتر</button>
</div>

<div class="divider"></div>

<!-- RESULTS -->
<div class="results-header">
  <div class="results-count" id="resultsCount"><strong>٠</strong> نتيجة</div>
  <button class="sort-btn" onclick="toggleSort()">ترتيب: <span id="sortLabel">الأحدث</span></button>
</div>

<div class="results-grid" id="resultsGrid">
  <div class="empty"><div class="ei">⏳</div><h3>جاري البحث...</h3></div>
</div>

<!-- BOTTOM NAV -->
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem active"><div class="bi">🧳</div><div>الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🎫</div><div class="bl">احجز</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🧭</div><div class="bl">المرشدون</div></a>
</nav>

<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');

const GRADS={'✈️':'linear-gradient(135deg,#1A6BFF,#00C9B1)','🏔️':'linear-gradient(135deg,#5B7FBF,#92A8D1)','🌊':'linear-gradient(135deg,#26A69A,#80CBC4)','🏛️':'linear-gradient(135deg,#EF6C00,#FFA726)','🌴':'linear-gradient(135deg,#2E7D32,#66BB6A)','🗼':'linear-gradient(135deg,#1565C0,#42A5F5)','🦁':'linear-gradient(135deg,#558B2F,#8BC34A)','🏝️':'linear-gradient(135deg,#00838F,#4DD0E1)','🌸':'linear-gradient(135deg,#AD1457,#F48FB1)'};

let allTrips=[], filters={dest:'الكل',tag:'الكل',dur:'الكل'}, sortBy='newest', minSeats=1;

async function init(){
  // Set default dates
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('dateFrom').min=today;
  document.getElementById('dateTo').min=today;

  const{data}=await sb.from('trips').select('*').eq('status','active').order('created_at',{ascending:false});
  allTrips=data||[];
  applyFilters();
}

function setFilter(type,val,el){
  filters[type]=val;
  const group=type==='dest'?'destChips':type==='tag'?'tagChips':'durChips';
  document.getElementById(group).querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function updateSeats(val){
  minSeats=parseInt(val);
  document.getElementById('seatsVal').textContent=toAr(val)+'+';
  applyFilters();
}

function toggleSort(){
  sortBy=sortBy==='newest'?'seats':'newest';
  document.getElementById('sortLabel').textContent=sortBy==='newest'?'الأحدث':'الأماكن';
  applyFilters();
}

function resetFilters(){
  filters={dest:'الكل',tag:'الكل',dur:'الكل'};
  minSeats=1;
  document.getElementById('mainSearch').value='';
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.getElementById('seatsRange').value=1;
  document.getElementById('seatsVal').textContent='١+';
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.fchip:first-child').forEach(c=>c.classList.add('active'));
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('mainSearch').value.toLowerCase().trim();
  const dateFrom=document.getElementById('dateFrom').value;
  const dateTo=document.getElementById('dateTo').value;

  let results=allTrips.filter(t=>{
    // Text search
    const mq=!q||t.title?.toLowerCase().includes(q)||t.destination?.toLowerCase().includes(q)||t.country?.toLowerCase().includes(q)||t.description?.toLowerCase().includes(q);
    // Destination filter
    const md=filters.dest==='الكل'||t.country?.includes(filters.dest)||t.destination?.includes(filters.dest);
    // Tag filter
    const mt=filters.tag==='الكل'||(t.tags||[]).includes(filters.tag);
    // Date filter
    const mdf=!dateFrom||!t.date||t.date>=dateFrom;
    const mdt=!dateTo||!t.date||t.date<=dateTo;
    // Seats filter
    const left=(t.seats||5)-(t.seats_taken||0);
    const ms=left>=minSeats;
    // Duration filter (simple text match)
    const mdr=filters.dur==='الكل'||t.duration?.includes(filters.dur);

    return mq&&md&&mt&&mdf&&mdt&&ms&&mdr;
  });

  // Sort
  if(sortBy==='seats'){
    results.sort((a,b)=>((b.seats||5)-(b.seats_taken||0))-((a.seats||5)-(a.seats_taken||0)));
  }

  // Update count
  document.getElementById('resultsCount').innerHTML=`<strong>${toAr(results.length)}</strong> رحلة`;

  // Render
  const grid=document.getElementById('resultsGrid');
  if(results.length===0){
    grid.innerHTML=`<div class="empty"><div class="ei">🔍</div><h3>لا توجد نتائج</h3><p>جرب تغيير معايير البحث</p></div>`;
    return;
  }

  grid.innerHTML=results.map(t=>{
    const grad=GRADS[t.emoji]||'linear-gradient(135deg,#FF5C1A,#FFD000)';
    const left=(t.seats||5)-(t.seats_taken||0);
    const sc=left<=2?'background:rgba(229,57,53,0.15);color:#ff6b6b':'background:rgba(0,201,177,0.12);color:var(--tl)';
    const dt=t.date?new Date(t.date).toLocaleDateString('ar-KW',{day:'numeric',month:'long',year:'numeric'}):'';
    return`<div class="tcard" onclick="window.location.href='trip.html?id=${t.id}'">
      <div class="tc-img" style="background:${grad}">${t.emoji||'✈️'}</div>
      <div class="tc-body">
        <div class="tc-dest">📍 ${t.destination||''} · ${t.country||''}</div>
        <div class="tc-title">${t.title}</div>
        <div class="tc-meta">
          <span>📅 ${dt}</span>
          <span>⏱ ${t.duration||''}</span>
        </div>
        <div class="tc-tags">${(t.tags||[]).map(tag=>`<span class="tc-tag">${tag}</span>`).join('')}</div>
        <div class="tc-seats" style="${sc}">👥 ${toAr(left)} أماكن متاحة</div>
      </div>
    </div>`;
  }).join('');
}

function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
init();
</script>
</body>
</html>
