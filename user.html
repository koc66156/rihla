<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — ملف العضو</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-bottom:calc(var(--bot-h)+48px);}
.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-back{color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;cursor:pointer;background:none;border:none;}
.loading{position:fixed;inset:0;z-index:2000;background:var(--dk);display:flex;align-items:center;justify-content:center;}
.loading.hide{display:none;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,92,26,0.15);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cover{height:160px;position:relative;margin:calc(var(--nav-h) + 4px) 16px 0;border-radius:20px;overflow:hidden;}
.cover-bg{position:absolute;inset:0;}
.cover-pattern{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.07) 1px,transparent 1px);background-size:18px 18px;}
.avatar-section{padding:0 20px;}
.avatar-wrap{margin-top:-40px;display:inline-block;}
.avatar{width:80px;height:80px;border-radius:22px;border:4px solid var(--dk);display:flex;align-items:center;justify-content:center;font-size:34px;}
.info{padding:12px 16px 16px;}
.profile-name{font-size:22px;font-weight:900;margin-bottom:4px;}
.profile-type{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:800;margin-bottom:10px;}
.tt{background:rgba(255,92,26,0.15);color:var(--or);}
.ta{background:rgba(0,201,177,0.15);color:var(--tl);}
.profile-bio{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:12px;font-style:italic;}
.profile-meta{display:flex;gap:14px;flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.stats{display:flex;margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.stat{flex:1;padding:13px 6px;text-align:center;border-left:1px solid var(--border);}
.stat:last-child{border-left:none;}
.stat .sv{font-size:19px;font-weight:900;background:linear-gradient(135deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;}
.stat .sl{font-size:10px;color:var(--muted);margin-top:2px;}
.countries-wrap{margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;}
.cw-title{font-size:13px;font-weight:800;margin-bottom:10px;}
.flags{display:flex;gap:7px;flex-wrap:wrap;}
.flag-tag{padding:5px 11px;border-radius:11px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:12px;}
.tabs{display:flex;margin:0 16px 16px;background:rgba(255,255,255,0.04);border-radius:14px;padding:3px;}
.tab{flex:1;padding:9px 4px;border-radius:12px;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .2s;}
.tab.active{background:var(--or);color:white;}
.posts-wrap{padding:0 16px;}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:14px;}
.post-img-single{width:100%;height:200px;object-fit:cover;}
.post-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:180px;}
.post-img-grid img{width:100%;height:100%;object-fit:cover;}
.post-no-img{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,rgba(255,92,26,0.1),rgba(255,208,0,0.06));}
.post-body{padding:14px;}
.post-dest{font-size:11px;color:var(--or);font-weight:700;margin-bottom:4px;}
.post-title{font-size:15px;font-weight:900;margin-bottom:6px;}
.post-text{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.7;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.post-foot{display:flex;align-items:center;justify-content:space-between;}
.post-time{font-size:10px;color:var(--muted);}
.like-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:10px;background:rgba(255,92,26,0.07);border:1px solid rgba(255,92,26,0.12);color:rgba(255,255,255,0.5);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.like-btn.liked{background:rgba(255,92,26,0.18);color:var(--or);}
.trips-wrap{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.trip-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;gap:10px;align-items:center;cursor:pointer;}
.trip-em{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.trip-info{flex:1;}
.trip-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.trip-meta{font-size:11px;color:var(--muted);}
.empty{text-align:center;padding:40px 16px;}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h3{font-size:16px;font-weight:800;margin-bottom:6px;}
.empty p{font-size:12px;color:var(--muted);}
.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}
.toast{position:fixed;bottom:calc(var(--bot-h)+14px);left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:11px 20px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border:1px solid rgba(255,255,255,0.08);pointer-events:none;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:all;}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>
<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-back" onclick="window.history.back()">← رجوع</button>
</nav>
<div id="mainContent" style="display:none">
  <div class="cover"><div class="cover-bg" id="coverBg"></div><div class="cover-pattern"></div></div>
  <div class="avatar-section"><div class="avatar-wrap"><div class="avatar" id="avatarEl"></div></div></div>
  <div class="info">
    <div class="profile-name" id="profileName"></div>
    <div class="profile-type" id="profileType"></div>
    <div class="profile-bio" id="profileBio" style="display:none"></div>
    <div class="profile-meta">
      <div class="meta-item">📍 <span id="profileCountry"></span></div>
      <div class="meta-item">📅 <span id="profileJoined"></span></div>
    </div>
  </div>
  <div class="stats" id="statsRow"></div>
  <div class="countries-wrap" id="countriesWrap" style="display:none">
    <div class="cw-title">🌍 الدول التي زارها</div>
    <div class="flags" id="flagsWrap"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('posts',this)">📸 المنشورات</button>
    <button class="tab" onclick="setTab('trips',this)">✈️ الرحلات</button>
  </div>
  <div id="postsWrap" class="posts-wrap"></div>
  <div id="tripsWrap" class="trips-wrap" style="display:none"></div>
</div>
<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div class="bl">طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🧭</div><div class="bl">المرشدون</div></a>
</nav>
<div class="toast" id="toast"></div>
<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');
const GRADS=['linear-gradient(135deg,#FF5C1A,#FFD000)','linear-gradient(135deg,#1A6BFF,#00C9B1)','linear-gradient(135deg,#7C3AED,#FF5C1A)','linear-gradient(135deg,#00838F,#4DD0E1)','linear-gradient(135deg,#558B2F,#FFD000)'];
const ALL_COUNTRIES=[{n:'تركيا',f:'🇹🇷'},{n:'اليابان',f:'🇯🇵'},{n:'فرنسا',f:'🇫🇷'},{n:'إيطاليا',f:'🇮🇹'},{n:'إسبانيا',f:'🇪🇸'},{n:'ألمانيا',f:'🇩🇪'},{n:'المملكة المتحدة',f:'🇬🇧'},{n:'الولايات المتحدة',f:'🇺🇸'},{n:'كندا',f:'🇨🇦'},{n:'أستراليا',f:'🇦🇺'},{n:'المالديف',f:'🇲🇻'},{n:'تايلاند',f:'🇹🇭'},{n:'إندونيسيا',f:'🇮🇩'},{n:'ماليزيا',f:'🇲🇾'},{n:'سنغافورة',f:'🇸🇬'},{n:'الهند',f:'🇮🇳'},{n:'الصين',f:'🇨🇳'},{n:'كوريا الجنوبية',f:'🇰🇷'},{n:'مصر',f:'🇪🇬'},{n:'المغرب',f:'🇲🇦'},{n:'كينيا',f:'🇰🇪'},{n:'جورجيا',f:'🇬🇪'},{n:'اليونان',f:'🇬🇷'},{n:'البرتغال',f:'🇵🇹'},{n:'هولندا',f:'🇳🇱'},{n:'سويسرا',f:'🇨🇭'},{n:'البرازيل',f:'🇧🇷'},{n:'أوزبكستان',f:'🇺🇿'}];
let currentUser=null,myLikes=new Set();
function getUserId(){return new URLSearchParams(window.location.search).get('id');}
async function init(){
  const uid=getUserId();
  if(!uid){window.location.href='index.html';return;}
  const{data:{session}}=await sb.auth.getSession();
  currentUser=session?.user||null;
  if(currentUser?.id===uid){window.location.href='profile.html';return;}
  const[{data:p},{data:posts},{data:trips}]=await Promise.all([
    sb.from('profiles').select('*').eq('id',uid).single(),
    sb.from('posts').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
    sb.from('trips').select('*').eq('user_id',uid).eq('status','active').order('created_at',{ascending:false})
  ]);
  if(currentUser){
    const{data:likes}=await sb.from('post_likes').select('post_id').eq('user_id',currentUser.id);
    if(likes) likes.forEach(l=>myLikes.add(l.post_id));
  }
  renderProfile(p,uid);
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><span class="sv">${toAr((posts||[]).length)}</span><div class="sl">منشور</div></div>
    <div class="stat"><span class="sv">${toAr((trips||[]).length)}</span><div class="sl">رحلة</div></div>
    <div class="stat"><span class="sv">${toAr((p?.visited_countries||[]).length)}</span><div class="sl">دولة</div></div>`;
  renderPosts(posts||[]);
  renderTrips(trips||[]);
  document.getElementById('loading').classList.add('hide');
  document.getElementById('mainContent').style.display='block';
}
function renderProfile(p,uid){
  const name=p?.full_name||'مستخدم رِحلة';
  const grad=GRADS[uid.charCodeAt(0)%GRADS.length];
  document.getElementById('coverBg').style.background=grad;
  document.getElementById('avatarEl').style.background=grad;
  document.getElementById('avatarEl').textContent=p?.avatar||name.substring(0,2);
  document.getElementById('profileName').textContent=name;
  const typeEl=document.getElementById('profileType');
  if(p?.account_type==='agent'){typeEl.className='profile-type ta';typeEl.textContent='🧭 مرشد سفر';}
  else{typeEl.className='profile-type tt';typeEl.textContent='✈️ مسافر';}
  if(p?.bio){document.getElementById('profileBio').textContent=p.bio;document.getElementById('profileBio').style.display='block';}
  document.getElementById('profileCountry').textContent=p?.country||'';
  document.getElementById('profileJoined').textContent=`عضو منذ ${new Date(p?.created_at||Date.now()).toLocaleDateString('ar-KW',{year:'numeric',month:'long'})}`;
  const countries=p?.visited_countries||[];
  if(countries.length>0){
    document.getElementById('countriesWrap').style.display='block';
    document.getElementById('flagsWrap').innerHTML=countries.map(c=>{const f=ALL_COUNTRIES.find(x=>x.n===c);return`<span class="flag-tag">${f?f.f:''} ${c}</span>`;}).join('');
  }
}
function setTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('postsWrap').style.display=tab==='posts'?'block':'none';
  document.getElementById('tripsWrap').style.display=tab==='trips'?'flex':'none';
}
function renderPosts(posts){
  const wrap=document.getElementById('postsWrap');
  if(!posts.length){wrap.innerHTML=`<div class="empty"><div class="ei">📸</div><h3>لا توجد منشورات</h3><p>لم ينشر هذا العضو بعد</p></div>`;return;}
  wrap.innerHTML=posts.map(p=>{
    const imgs=p.images||[];
    let img=imgs.length===0?`<div class="post-no-img">🌍</div>`:imgs.length===1?`<img class="post-img-single" src="${imgs[0]}" loading="lazy">`:`<div class="post-img-grid">${imgs.slice(0,4).map(i=>`<img src="${i}" loading="lazy">`).join('')}</div>`;
    const liked=myLikes.has(p.id);
    return`<div class="post-card">${img}<div class="post-body">${p.destination?`<div class="post-dest">📍 ${p.destination}</div>`:''}<div class="post-title">${p.title}</div>${p.content?`<div class="post-text">${p.content}</div>`:''}<div class="post-foot"><div class="post-time">${new Date(p.created_at).toLocaleDateString('ar-KW',{day:'numeric',month:'long'})}</div><button class="like-btn ${liked?'liked':''}" id="lk-${p.id}" onclick="toggleLike('${p.id}',${p.likes||0})">${liked?'❤️':'🤍'} ${toAr(p.likes||0)}</button></div></div></div>`;
  }).join('');
}
function renderTrips(trips){
  const wrap=document.getElementById('tripsWrap');
  if(!trips.length){wrap.innerHTML=`<div class="empty"><div class="ei">✈️</div><h3>لا توجد رحلات</h3><p>لم ينشر هذا العضو رحلات بعد</p></div>`;return;}
  wrap.innerHTML=trips.map(t=>`<div class="trip-card" onclick="window.location.href='trip.html?id=${t.id}'"><div class="trip-em">${t.emoji||'✈️'}</div><div class="trip-info"><div class="trip-name">${t.title}</div><div class="trip-meta">📅 ${new Date(t.date).toLocaleDateString('ar-KW',{day:'numeric',month:'long'})} · ${t.country}</div></div></div>`).join('');
}
async function toggleLike(postId,cur){
  if(!currentUser){showToast('سجّل دخولك للإعجاب 👤');return;}
  const btn=document.getElementById(`lk-${postId}`);
  const liked=myLikes.has(postId);
  if(liked){myLikes.delete(postId);await sb.from('post_likes').delete().eq('post_id',postId).eq('user_id',currentUser.id);await sb.from('posts').update({likes:Math.max(0,cur-1)}).eq('id',postId);btn.className='like-btn';btn.innerHTML=`🤍 ${toAr(Math.max(0,cur-1))}`;}
  else{myLikes.add(postId);await sb.from('post_likes').insert({post_id:postId,user_id:currentUser.id});await sb.from('posts').update({likes:cur+1}).eq('id',postId);btn.className='like-btn liked';btn.innerHTML=`❤️ ${toAr(cur+1)}`;}
}
function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
init();
</script>
</body>
</html>
