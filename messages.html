<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>رِحلة — الرسائل</title>
<meta name="theme-color" content="#FF5C1A">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--or:#FF5C1A;--yl:#FFD000;--tl:#00C9B1;--dk:#0E0E0E;--muted:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--nav-h:64px;--bot-h:64px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--dk);color:white;min-height:100vh;padding-bottom:calc(var(--bot-h)+48px);}

.topnav{position:fixed;top:0;width:100%;z-index:1000;height:var(--nav-h);padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Righteous',cursive;font-size:22px;background:linear-gradient(90deg,var(--or),var(--yl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;border:none;background-color:transparent;cursor:pointer;}
.nav-back{color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;background:none;border:none;cursor:pointer;}

.main{padding:calc(var(--nav-h)+24px) 16px 0;}
.page-title{font-size:24px;font-weight:900;margin-bottom:18px;}

.convs-list{display:flex;flex-direction:column;gap:8px;}
.conv-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .2s;}
.conv-item:hover{border-color:var(--or);}
.conv-av{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-size:14px;font-weight:800;margin-bottom:3px;}
.conv-last{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.conv-time{font-size:10px;color:var(--muted);flex-shrink:0;}

.empty{text-align:center;padding:60px 20px;}
.empty .ei{font-size:56px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7;}
.empty button{padding:12px 28px;border-radius:20px;background:var(--or);color:white;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

.botnav{position:fixed;bottom:0;width:100%;z-index:1000;height:var(--bot-h);background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;}
.bitem{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-decoration:none;padding:6px 0;}
.bitem .bi{font-size:20px;line-height:1;}
.bitem .bl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);}
</style>
</head>
<body>

<nav class="topnav">
  <button class="nav-logo" onclick="window.location.href='index.html'">Rihla</button>
  <button class="nav-back" onclick="window.history.back()">← رجوع</button>
</nav>

<div class="main">
  <div class="page-title">💬 الرسائل</div>
  <div class="convs-list" id="convsList">
    <div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">جاري التحميل...</div>
  </div>
</div>

<nav class="botnav">
  <a href="index.html" class="bitem"><div class="bi">🏠</div><div class="bl">الرئيسية</div></a>
  <a href="trips.html" class="bitem"><div class="bi">✈️</div><div class="bl">الرحلات</div></a>
  <a href="destinations.html" class="bitem"><div class="bi">🗺️</div><div class="bl">الوجهات</div></a>
  <a href="flights.html" class="bitem"><div class="bi">🛫</div><div class="bl">طيران</div></a>
  <a href="agents.html" class="bitem"><div class="bi">🧭</div><div class="bl">المرشدون</div></a>
</nav>

<script>
const{createClient}=supabase;
const sb=createClient('https://ybjdagurvkweabujkeyz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamRhZ3Vydmt3ZWFidWprZXl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyMDAsImV4cCI6MjA5NDk0MDIwMH0.CIK7sew_-kBlC_t_szCjKjjnFNg695kwSryuRshQ9nI');

const GRADS=['linear-gradient(135deg,#FF5C1A,#FFD000)','linear-gradient(135deg,#1A6BFF,#00C9B1)','linear-gradient(135deg,#7C3AED,#FF5C1A)','linear-gradient(135deg,#00838F,#4DD0E1)','linear-gradient(135deg,#558B2F,#FFD000)'];

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='auth.html';return;}
  const userId=session.user.id;

  const{data:convs}=await sb.from('conversations').select('*').or(`user1_id.eq.${userId},user2_id.eq.${userId}`).order('last_message_at',{ascending:false});

  const list=document.getElementById('convsList');
  if(!convs||convs.length===0){
    list.innerHTML=`<div class="empty"><div class="ei">💬</div><h3>لا توجد رسائل بعد</h3><p>ابدأ محادثة من أي ملف عضو في رِحلة</p><button onclick="window.location.href='index.html'">🏠 العودة للرئيسية</button></div>`;
    return;
  }

  // جلب بيانات المستخدمين الآخرين
  const otherIds=convs.map(c=>c.user1_id===userId?c.user2_id:c.user1_id);
  const{data:profiles}=await sb.from('profiles').select('id,full_name,avatar').in('id',otherIds);
  const profMap={};
  if(profiles) profiles.forEach(p=>profMap[p.id]=p);

  list.innerHTML=convs.map(c=>{
    const otherId=c.user1_id===userId?c.user2_id:c.user1_id;
    const p=profMap[otherId]||{};
    const name=p.full_name||'مستخدم';
    const avatar=p.avatar||name.substring(0,2);
    const grad=GRADS[otherId.charCodeAt(0)%GRADS.length];
    const time=c.last_message_at?timeAgo(c.last_message_at):'';
    return`<div class="conv-item" onclick="window.location.href='dm.html?id=${c.id}'">
      <div class="conv-av" style="background:${grad}">${avatar}</div>
      <div class="conv-info">
        <div class="conv-name">${name}</div>
        <div class="conv-last">${c.last_message||'ابدأ محادثة جديدة...'}</div>
      </div>
      <div class="conv-time">${time}</div>
    </div>`;
  }).join('');
}

function timeAgo(dateStr){
  const diff=Date.now()-new Date(dateStr).getTime();
  const mins=Math.floor(diff/60000);
  const hours=Math.floor(diff/3600000);
  const days=Math.floor(diff/86400000);
  if(mins<1) return 'الآن';
  if(mins<60) return `${toAr(mins)}د`;
  if(hours<24) return `${toAr(hours)}س`;
  if(days<7) return `${toAr(days)}ي`;
  return new Date(dateStr).toLocaleDateString('ar-KW',{day:'numeric',month:'short'});
}
function toAr(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
init();
</script>
</body>
</html>
